// Upload
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const firstSheet = wb.Sheets[wb.SheetNames[0]];
    excelData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
    populateDropdowns();
    generateFilters();
    // Clear previous table data when new file loaded
    tableData = [];
    document.getElementById('resultTable').innerHTML = '';
    // Reset column percentages
    columnPercent = {};
    alert("Excel Loaded Successfully!");
  };
  reader.readAsArrayBuffer(file);
});

// Add Column
function addColumn(){
  const mappingArea = document.getElementById('mappingArea');
  const cards = mappingArea.querySelectorAll('.glass-card');
  
  const newCard = document.createElement('div');
  newCard.className = 'glass-card dark shine card p-4 mb-3';
  newCard.innerHTML = `
    <button class="btn btn-sm btn-light remove-btn" onclick="removeColumn(this)">❌</button>
    <div class="row g-2 align-items-center mb-2 mt-2">
      <div class="col-md-6">
        <input class="form-control header" placeholder="Header Name">
      </div>
      <div class="col-md-6">
        <div class="row g-2">
          <div class="col-8">
            <select class="form-select column-select"></select>
          </div>
          <div class="col-4">
            <button class="btn btn-primary w-100 add-col">Add</button>
          </div>
        </div>
      </div>
    </div>
    <textarea class="form-control mapping" placeholder="Use <Column>"></textarea>
  `;
  mappingArea.appendChild(newCard);
  populateDropdowns();
}

function removeColumn(btn){
  const allCards = document.querySelectorAll('#mappingArea .glass-card');
  if(allCards.length <= 1){
    alert("At least one column is required!");
    return;
  }
  btn.closest('.glass-card').remove();
}

// Populate dropdown
function populateDropdowns(){
  if(!excelData.length) return;
  const cols = Object.keys(excelData[0]);
  document.querySelectorAll('.column-select').forEach(s=>{
    s.innerHTML = cols.map(c=>`<option value="${c}">${c}</option>`).join('');
  });
}

// Insert column tag
document.addEventListener('click',e=>{
  if(e.target.classList.contains('add-col')){
    const card = e.target.closest('.glass-card');
    const select = card.querySelector('select');
    const textarea = card.querySelector('textarea');
    const col = select.value;
    textarea.value += `<${col}>`;
    textarea.focus();
  }
});

// Generate Filters with proper event handling
function generateFilters(){
  if(!excelData || excelData.length === 0){
    document.getElementById("filterArea").innerHTML = "<div class='text-danger'>No data available</div>";
    return;
  }

  const columns = Object.keys(excelData[0]);
  let html = "";

  columns.forEach(col=>{
    const vals = [...new Set(
      excelData
        .map(r => r[col])
        .filter(v => v !== undefined && v !== null && v !== "")
    )];

    html += `
<div class="mb-3 p-2">
  <div class="d-flex justify-content-between align-items-center mb-1">
    <label class="fw-semibold mb-0">${col}</label>
    <div>
      <button class="btn btn-sm btn-outline-primary select-all-btn" data-col="${col}">All</button>
      <button class="btn btn-sm btn-outline-danger clear-all-btn" data-col="${col}">Clear</button>
    </div>
  </div>

  <!-- 🔍 SEARCH BOX -->
  <input type="text" 
         class="form-control form-control-sm mb-2 filter-search" 
         placeholder="Search ${col}..." 
         data-col="${col}">

  <div class="border filter-input-bg rounded p-2" style="max-height:200px; overflow:auto;">
    ${vals.map((v,i)=>`
      <div class="form-check">
        <input class="form-check-input filter-checkbox" 
               type="checkbox" 
               value="${String(v).replace(/"/g, '&quot;')}" 
               data-col="${col}" 
               id="${col}_${i}">
        <label class="form-check-label" for="${col}_${i}">
          ${String(v)}
        </label>
      </div>
    `).join("")}
  </div>
</div>`;
  });

  document.getElementById("filterArea").innerHTML = html;
  
  // Attach event listeners for Select All and Clear All buttons
  document.querySelectorAll('.select-all-btn').forEach(btn => {
    btn.removeEventListener('click', handleSelectAll);
    btn.addEventListener('click', handleSelectAll);
  });
  
  document.querySelectorAll('.clear-all-btn').forEach(btn => {
    btn.removeEventListener('click', handleClearAll);
    btn.addEventListener('click', handleClearAll);
  });

  // 🔍 SEARCH + AUTO SELECT
document.querySelectorAll('.filter-search').forEach(input => {

  input.addEventListener('input', function(){
    const col = this.dataset.col;
    const search = this.value.toLowerCase().trim();

    const checkboxes = document.querySelectorAll(`.filter-checkbox[data-col="${col}"]`);

    checkboxes.forEach(cb => {
      const label = document.querySelector(`label[for="${cb.id}"]`);
      const text = label ? label.textContent.toLowerCase() : "";

      if(search === ""){
        // if empty → do nothing (keep current selection)
        return;
      }

      if(text.includes(search)){
        cb.checked = true;   // ✅ AUTO SELECT MATCH
      } else {
        cb.checked = false;  // ❌ UNSELECT NON-MATCH
      }
    });
  });

});
}

function handleSelectAll(e) {
  e.stopPropagation();
  const col = e.target.dataset.col;
  document.querySelectorAll(`.filter-checkbox[data-col="${col}"]`)
    .forEach(cb => cb.checked = true);
}

function handleClearAll(e) {
  e.stopPropagation();
  const col = e.target.dataset.col;
  document.querySelectorAll(`.filter-checkbox[data-col="${col}"]`)
    .forEach(cb => cb.checked = false);
}

// Get filtered data based on checkbox selections
function getFiltered(){
  if(!excelData.length) return [];
  
  return excelData.filter(row => {
    const allCheckboxes = document.querySelectorAll('.filter-checkbox');
    if(allCheckboxes.length === 0) return true;
    
    // Group checkboxes by column
    const columnChecks = {};
    allCheckboxes.forEach(cb => {
      const col = cb.dataset.col;
      if(!columnChecks[col]) columnChecks[col] = [];
      columnChecks[col].push(cb);
    });
    
    // Check each column that has any checked boxes
    for(const col in columnChecks) {
      const checkedBoxes = columnChecks[col].filter(cb => cb.checked);
      if(checkedBoxes.length > 0) {
        const selectedValues = checkedBoxes.map(cb => cb.value);
        const cellValue = String(row[col] ?? '');
        if(!selectedValues.includes(cellValue)) {
          return false;
        }
      }
    }
    return true;
  });
}

function processData(){

  const btn = document.getElementById("syncBtn");
  const text = btn.querySelector(".btn-text");
  const spinner = btn.querySelector(".spinner-border");

  // 🔥 SHOW SPINNER
  text.classList.add("d-none");
  spinner.classList.remove("d-none");
  btn.disabled = true;

  // ⏳ Allow UI to update before heavy work
  setTimeout(() => {
    try {

      if(!excelData || excelData.length === 0){
        alert("Please upload an Excel file first!");
        return;
      }

      const headerInputs = document.querySelectorAll('.header');
      const mappingInputs = document.querySelectorAll('.mapping');

      let hasEmptyHeader = false;
      headerInputs.forEach((input) => {
        if(!input.value.trim()) {
          input.style.border = '1px solid red';
          hasEmptyHeader = true;
        } else {
          input.style.border = '';
        }
      });

      if(hasEmptyHeader) {
        alert("Please fill in all header names!");
        return;
      }

      const filtered = getFiltered();

      if(!filtered.length){
        alert("No data found after applying filters!");
        return;
      }

      tableData = filtered.map((row, rowIndex) => {
        let obj = {};
        obj["_raw"] = row;
        obj["SL"] = rowIndex + 1;

        mappingInputs.forEach((m, i) => {
          let header = headerInputs[i].value.trim();
          let finalHeader = header;
          let counter = 1;

          while(obj.hasOwnProperty(finalHeader)) {
            finalHeader = `${header}_${counter++}`;
          }

          let textVal = m.value.replace(/<([^>]+)>/g, (match, col) => {
            return row[col.trim()] ?? "";
          });

          obj[finalHeader] = textVal;
        });

        return obj;
      });

      renderTable();

    } catch (err) {
      console.error(err);
      alert("Error: " + err.message);
    } finally {
      // 🔥 HIDE SPINNER (ALWAYS RUNS)
      text.classList.remove("d-none");
      spinner.classList.add("d-none");
      btn.disabled = false;
    }

  }, 100); // small delay to show spinner
}

// Render Table with proper sorting indicators
function renderTable(){
  if(!tableData.length) {
    document.getElementById('resultTable').innerHTML = '<tbody><tr><td class="text-center">No data to display</td></tr></tbody>';
    return;
  }
  
  const keys = Object.keys(tableData[0]).filter(k => k !== "_raw");
  let html = "<thead><tr>";
  keys.forEach(k => {
    const sortIndicator = (currentSortColumn === k) ? (currentSortOrder === 'asc' ? ' ▲' : ' ▼') : '';
    html += `<th style="background:#e0e0e0;font-weight:bold;cursor:pointer;" onclick="sortTable('${k.replace(/'/g, "\\'")}')">${k}${sortIndicator}</th>`;
  });
  html += "</tr></thead><tbody>";
  
  tableData.forEach(row => {
    html += "<tr>";
    keys.forEach(k => {
      let cellValue = row[k] ?? "";
      html += `<td>${String(cellValue).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>`;
    });
    html += "</tr>";
  });
  html += "</tbody>";
  document.getElementById('resultTable').innerHTML = html;
}

// Sort Table
function sortTable(col){
  if(col === "_raw") return; // ignore

  if(currentSortColumn === col) {
    currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
  } else {
    currentSortColumn = col;
    currentSortOrder = 'asc';
  }

  tableData.sort((a, b) => {
    let valA = String(a[col] ?? "");
    let valB = String(b[col] ?? "");

    if(col === 'SL'){
      valA = Number(valA) || 0;
      valB = Number(valB) || 0;
    }

    if(valA < valB) return currentSortOrder === 'asc' ? -1 : 1;
    if(valA > valB) return currentSortOrder === 'asc' ? 1 : -1;
    return 0;
  });

  tableData.forEach((r, i) => r.SL = i + 1);

  renderTable();
}

// PDF Generation - Fixed
function downloadPDF(){

  if(!tableData.length) {
    alert("No data to generate PDF! Please sync Excel data first.");
    return;
  }

  const btn = document.getElementById("pdfBtn");
  const text = btn.querySelector(".btn-text");
  const spinner = btn.querySelector(".spinner-border");

  text.classList.add("d-none");
  spinner.classList.remove("d-none");
  btn.disabled = true;

  setTimeout(() => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const subject = document.getElementById('subjectText').value || "";
      const fontSize = Number(document.getElementById('fontSize').value);
      const repeatSubject = document.getElementById('repeatSubject').checked;
      let subjectAlign = document.querySelector('.align-btn.active')?.dataset.align || "left";

      const pageWidth = doc.internal.pageSize.getWidth();
      const usableWidth = pageWidth - 20;

      // ✅ REMOVE _raw
      const keys = Object.keys(tableData[0]).filter(k => k !== "_raw");

      // =========================
      // ✅ COLUMN WIDTH LOGIC
      // =========================
      let totalPercent = 0;
      let validPercentages = true;

      keys.forEach(k => {
        let percent = columnPercent[k];

        // ✅ SL default 5%
        if (k === "SL" && (!percent || percent <= 0 || isNaN(percent))) {
          percent = 5;
          columnPercent[k] = 5;
        }

        if (!percent || percent <= 0 || isNaN(percent)) {
          validPercentages = false;
        } else {
          totalPercent += percent;
        }
      });

      let columnWidths = [];

      if (validPercentages && Math.abs(totalPercent - 100) < 0.1) {

        keys.forEach(k => {
          let width = (columnPercent[k] / 100) * usableWidth;
          columnWidths.push(width);
        });

      } else {

        // ✅ fallback → SL = 5%, rest equal
        let remainingWidth = usableWidth;
        let slWidth = 0;

        if (keys.includes("SL")) {
          slWidth = (5 / 100) * usableWidth;
          remainingWidth -= slWidth;
        }

        let otherCols = keys.length - (keys.includes("SL") ? 1 : 0);
        let equalWidth = otherCols > 0 ? remainingWidth / otherCols : usableWidth;

        keys.forEach(k => {
          if (k === "SL") {
            columnWidths.push(slWidth);
          } else {
            columnWidths.push(equalWidth);
          }
        });
      }

      let totalWidth = columnWidths.reduce((a, b) => a + b, 0);
      let startX = (pageWidth - totalWidth) / 2;
      if (startX < 10) startX = 10;

      // =========================
      // SUBJECT DRAW
      // =========================
      function drawSubject(yPos = 10) {
        doc.setFont("helvetica", "bold");
        doc.setFontSize(fontSize + 2);

        const lines = doc.splitTextToSize(subject, usableWidth);

        if(subjectAlign === "center"){
          doc.text(lines, pageWidth / 2, yPos, { align: "center" });
        } else if(subjectAlign === "right"){
          doc.text(lines, pageWidth - 10, yPos, { align: "right" });
        } else {
          doc.text(lines, 10, yPos);
        }

        doc.setFont("helvetica", "normal");
        return yPos + (lines.length * ((fontSize + 2) / 2.5));
      }

      let currentY = drawSubject(10) + 5;

      // =========================
      // COLUMN STYLE MAP
      // =========================
      let columnStyles = {};
      columnWidths.forEach((width, idx) => {
        columnStyles[idx] = { cellWidth: width };
      });

      // =========================
      // TABLE
      // =========================
      doc.autoTable({
        head: [keys],
        body: tableData.map(r => keys.map(k => r[k])),
        startY: currentY,
        margin: { left: startX, right: pageWidth - startX - totalWidth },
        styles: {
          fontSize: fontSize,
          lineWidth: 0.2,
          lineColor: [0,0,0],
          cellPadding: 2,
          overflow: 'linebreak',
          valign: 'middle'
        },
        headStyles: {
          fillColor: [200,200,200],
          textColor: [0,0,0],
          fontStyle: 'bold',
          lineWidth: 0.3,
          halign: 'center',
          valign: 'middle'
        },
        columnStyles: columnStyles,
        didDrawPage: (data) => {
          if(repeatSubject && data.pageNumber > 1){
            drawSubject(10);
          }
        }
      });

      doc.save("report.pdf");

    } catch(error) {
      console.error("PDF Error:", error);
      alert("Error generating PDF: " + error.message);
    } finally {
      text.classList.remove("d-none");
      spinner.classList.add("d-none");
      btn.disabled = false;
    }

  }, 100);
}
// Print by Selection - Generate separate PDFs for each filter combination
async function printBySelection(){

  const useZip = askDownloadType(); // true = ZIP, false = separate

  const btn = document.querySelector('[onclick="printBySelection()"]');
  if(btn) btn.disabled = true;

  if(!tableData.length){
    alert("Sync data first!");
    if(btn) btn.disabled = false;
    return;
  }

  let zip = new JSZip();

  const selectedGroups = {};
  document.querySelectorAll('.filter-checkbox:checked').forEach(cb => {
    const col = cb.dataset.col;
    const val = cb.value;

    if(!selectedGroups[col]) selectedGroups[col] = [];
    selectedGroups[col].push(val);
  });

  if(Object.keys(selectedGroups).length === 0){
    alert("Select at least one filter value!");
    if(btn) btn.disabled = false;
    return;
  }

  function getCombinations(groups){
    const cols = Object.keys(groups);

    function helper(index, current){
      if(index === cols.length) return [current];

      const col = cols[index];
      const values = groups[col];
      let result = [];

      values.forEach(val => {
        result = result.concat(helper(index+1, { ...current, [col]: val }));
      });

      return result;
    }

    return helper(0, {});
  }

  const combinations = getCombinations(selectedGroups);
  let successCount = 0;

  // ✅ IMPORTANT: use for...of (NOT forEach)
  for(const combo of combinations){

    let filteredRows = tableData.filter(row => {
      return Object.keys(combo).every(col => {
        return String(row._raw[col] ?? '') === combo[col];
      });
    });

    if(!filteredRows.length) continue;

    let localTable = filteredRows.map((row, i) => {
      let newRow = { ...row };
      newRow.SL = i + 1;
      delete newRow._raw;
      return newRow;
    });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    const fontSize = Number(document.getElementById('fontSize').value);
    const repeatSubject = document.getElementById('repeatSubject').checked;
    let subjectAlign = document.querySelector('.align-btn.active')?.dataset.align || "left";

    const pageWidth = doc.internal.pageSize.getWidth();
    const usableWidth = pageWidth - 20;
    const keys = Object.keys(localTable[0]);

    let subject = document.getElementById('subjectText').value || "";
    const comboValues = Object.values(combo);
    subject = subject ? subject + " - " + comboValues.join(" - ") : comboValues.join(" - ");

    function drawSubject(yPos = 10) {
      doc.setFont("helvetica", "bold");
      doc.setFontSize(fontSize + 2);

      const lines = doc.splitTextToSize(subject, usableWidth);

      if(subjectAlign === "center"){
        doc.text(lines, pageWidth / 2, yPos, { align: "center" });
      } else if(subjectAlign === "right"){
        doc.text(lines, pageWidth - 10, yPos, { align: "right" });
      } else {
        doc.text(lines, 10, yPos);
      }

      doc.setFont("helvetica", "normal");
      return yPos + (lines.length * ((fontSize + 2) / 2.5));
    }

    let currentY = drawSubject(10) + 5;

    doc.autoTable({
      head: [keys],
      body: localTable.map(r => keys.map(k => r[k])),
      startY: currentY,
      styles: {
        fontSize: fontSize,
        lineWidth: 0.2,
        cellPadding: 2,
        overflow: 'linebreak'
      },
      headStyles: {
        fillColor: [200,200,200],
        textColor: [0,0,0],
        fontStyle: 'bold',
        halign: 'center'
      },
      didDrawPage: (data) => {
        if(repeatSubject && data.pageNumber > 1){
          drawSubject(10);
        }
      }
    });

    let fileName = comboValues.join("_").replace(/[\\/:*?"<>|]/g, "_");

    // ✅ ZIP or direct download
    if(useZip){
      const pdfBlob = doc.output("blob");
      zip.file(fileName + ".pdf", pdfBlob);
    } else {
      doc.save(fileName + ".pdf");
    }

    successCount++;
  }

  // ✅ AFTER LOOP → ZIP DOWNLOAD
  if(useZip && successCount > 0){
    const content = await zip.generateAsync({ type: "blob" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "PDF_Files.zip";
    a.click();
  }

  if(successCount === 0){
    alert("No data found!");
  } else {
    alert(`Generated ${successCount} file(s)!`);
  }

  if(btn) btn.disabled = false;
}
// Download Excel
function downloadExcel(){
  if(!tableData.length) {
    alert("No data to export! Please sync Excel data first.");
    return;
  }
  
  const cleanData = tableData.map(row => {
    let obj = {};
    Object.keys(row).forEach(k => {
      obj[k] = String(row[k]).replace(/<br>/g, "\n");
    });
    return obj;
  });
  
  const ws = XLSX.utils.json_to_sheet(cleanData);
  ws['!cols'] = Object.keys(cleanData[0] || {}).map(() => ({ wch: 15 }));
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");
  XLSX.writeFile(wb, "report.xlsx");
}




async function downloadExcelBySelection(){

  const useZip = askDownloadType(); // true = ZIP

  const btn = document.querySelector('[onclick="downloadExcelBySelection()"]');
  if(btn) btn.disabled = true;

  if(!tableData.length){
    alert("Sync data first!");
    if(btn) btn.disabled = false;
    return;
  }

  let zip = new JSZip();

  const selectedGroups = {};
  document.querySelectorAll('.filter-checkbox:checked').forEach(cb => {
    const col = cb.dataset.col;
    const val = cb.value;

    if(!selectedGroups[col]) selectedGroups[col] = [];
    selectedGroups[col].push(val);
  });

  if(Object.keys(selectedGroups).length === 0){
    alert("Select at least one filter value!");
    if(btn) btn.disabled = false;
    return;
  }

  function getCombinations(groups){
    const cols = Object.keys(groups);

    function helper(index, current){
      if(index === cols.length) return [current];

      const col = cols[index];
      const values = groups[col];
      let result = [];

      values.forEach(val => {
        result = result.concat(helper(index+1, { ...current, [col]: val }));
      });

      return result;
    }

    return helper(0, {});
  }

  const combinations = getCombinations(selectedGroups);
  let successCount = 0;

  // ✅ IMPORTANT: use for...of
  for(const combo of combinations){

    let filteredRows = tableData.filter(row => {
      return Object.keys(combo).every(col => {
        return String(row._raw[col] ?? '') === combo[col];
      });
    });

    if(!filteredRows.length) continue;

    let localData = filteredRows.map((row, i) => {
      let newRow = { ...row };
      newRow.SL = i + 1;
      delete newRow._raw;
      return newRow;
    });

    const ws = XLSX.utils.json_to_sheet(localData);

    ws['!cols'] = Object.keys(localData[0] || {}).map(() => ({ wch: 20 }));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");

    let fileName = Object.values(combo)
      .join("_")
      .replace(/[\\/:*?"<>|]/g, "_");

    // ✅ ZIP or direct download
    if(useZip){
      const excelBlob = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      zip.file(fileName + ".xlsx", excelBlob);
    } else {
      XLSX.writeFile(wb, fileName + ".xlsx");
    }

    successCount++;
  }

  // ✅ AFTER LOOP → ZIP download
  if(useZip && successCount > 0){
    const content = await zip.generateAsync({ type: "blob" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "Excel_Files.zip";
    a.click();
  }

  if(successCount === 0){
    alert("No data found!");
  } else {
    alert(`Generated ${successCount} file(s)!`);
  }

  if(btn) btn.disabled = false;
}

function openDistribution(){
  if(!tableData.length) {
    alert("Please sync Excel data first!");
    return;
  }
  
  // ❌ REMOVE _raw here
  const keys = Object.keys(tableData[0]).filter(k => k !== "_raw");

  let html = "";
  keys.forEach(k => {
    let percentValue = columnPercent[k] || (k === "SL" ? 5 : (100 / keys.length).toFixed(2));

    if(k === "SL" && (!columnPercent[k] || columnPercent[k] === 0)) {
      percentValue = 5;
    }

    html += `
      <div class="mb-3">
        <label class="fw-semibold">${k}</label>
        <input type="number" class="form-control dist-input" 
          data-col="${k.replace(/"/g, '&quot;')}" 
          value="${typeof percentValue === 'number' ? percentValue.toFixed(2) : percentValue}" 
          step="any" min="0" max="100">
      </div>
    `;
  });

  html += `<div class="alert alert-info mt-2">Total: <span id="distTotal">0</span>%</div>`;
  document.getElementById('distBody').innerHTML = html;
  
  // Add live total calculation
  const inputs = document.querySelectorAll('.dist-input');
  const updateTotal = () => {
    let total = 0;
    inputs.forEach(i => {
      total += parseFloat(i.value) || 0;
    });
    const totalSpan = document.getElementById('distTotal');
    if(totalSpan) totalSpan.textContent = total.toFixed(2);
  };
  
  inputs.forEach(i => {
    i.addEventListener('input', updateTotal);
  });
  updateTotal();
  
  new bootstrap.Modal(document.getElementById('distModal')).show();
}


// Save Distribution Percentages
// Update saveDistribution function to ensure SL doesn't get 0%
function saveDistribution(){
  const inputs = document.querySelectorAll('.dist-input');
  let total = 0;
  let newPercent = {};
  
  inputs.forEach(i => {
    let val = parseFloat(i.value) || 0;
    if(val < 0) val = 0;
    
    // Ensure SL column doesn't get 0% (minimum 1%)
    if(i.dataset.col === "SL" && val === 0) {
      val = 1;
      i.value = 1;
    }
    
    newPercent[i.dataset.col] = val;
    total += val;
  });
  
  if(total === 0) {
    const keys = Object.keys(newPercent);
    keys.forEach(k => {
      if(k === "SL") {
        newPercent[k] = 5;
      } else {
        newPercent[k] = (100 - 5) / (keys.length - 1);
      }
    });
    total = 100;
  } else if(Math.abs(total - 100) > 0.01) {
    const ratio = 100 / total;
    inputs.forEach(i => {
      let newVal = parseFloat((newPercent[i.dataset.col] * ratio).toFixed(2));
      // Ensure SL doesn't become 0 after normalization
      if(i.dataset.col === "SL" && newVal < 1) {
        newVal = 1;
      }
      newPercent[i.dataset.col] = newVal;
    });
  }
  
  columnPercent = newPercent;
  
  inputs.forEach(i => {
    columnPercent[i.dataset.col] = parseFloat(columnPercent[i.dataset.col].toFixed(2));
    i.value = columnPercent[i.dataset.col].toFixed(2);
  });
  
  alert("Column distribution saved! SL column default is 5%.");
  bootstrap.Modal.getInstance(document.getElementById('distModal')).hide();
  
  // Re-render table to apply new distribution
  if(tableData.length) renderTable();
}
