<body class="p-2">

<!-- SUBJECT -->

<div class="col-md-6">

    </button>

  <table class="table table-bordered" id="resultTable"></table>

<!-- FILTER PANEL -->
<div class="offcanvas offcanvas-end" id="filterPanel">
  <div class="offcanvas-header">
    <h5 class="sg-text">Filters</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body" id="filterArea"></div>
</div>


<div class="modal fade" id="distModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Column Distribution (%)</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="distBody"></div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="saveDistribution()">Save</button>
      </div>

    </div>
  </div>
</div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
let excelData = [];
let tableData = [];
let sortDirection = {};
let columnPercent = {}; // store %

// Upload
document.getElementById('fileInput').addEventListener('change', e => {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    excelData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    populateDropdowns();
    generateFilters();
    alert("Excel Loaded");
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

// Add Column
function addColumn(){
  document.getElementById('mappingArea').insertAdjacentHTML('beforeend',`
    <div class="glass-card dark shine card p-4 mb-3">
      <button class="btn btn-sm btn-light remove-btn" onclick="removeColumn(this)">❌</button>
      <div class="row g-2 align-items-center mb-2 mt-2">
        <div class="col-md-6">
          <input class="form-control header" placeholder="Header Name">
        </div>
        <div class="col-md-6">
          <div class="row g-2">
            <div class="col-8">
              <select class="form-select column-select"></select>
            </div>
            <div class="col-4">
              <button class="btn btn-primary w-100 add-col">Add</button>
            </div>
          </div>
        </div>
      </div>
      <textarea class="form-control mapping" placeholder="Use <Column>"></textarea>
    </div>
  `);
  populateDropdowns();
}

function removeColumn(btn){
  const allCards = document.querySelectorAll('#mappingArea .glass-card');

  // 🚨 If only one column left
  if(allCards.length <= 1){
    alert("At least one column is required!");
    return;
  }

  // ✅ Remove normally
  btn.closest('.glass-card').remove();
}

// Populate dropdown
function populateDropdowns(){
  if(!excelData.length) return;
  const cols = Object.keys(excelData[0]);
  document.querySelectorAll('.column-select').forEach(s=>{
    s.innerHTML = cols.map(c=>`<option value="${c}">${c}</option>`).join('');
  });
}

// Insert column tag
document.addEventListener('click',e=>{
  if(e.target.classList.contains('add-col')){
    const c=e.target.closest('.card');
    const col=c.querySelector('select').value;
    const t=c.querySelector('textarea');
    t.value += (t.value ? "" : "") + `<${col}>`;
  }
});

// Filters

//       <label class="small">${col}</label>
//       <select multiple class="form-select filter" data-col="${col}">
//         ${vals.map(v=>`<option value="${v}">${v}</option>`).join("")}
//       </select>
//     </div>`;
//   });

function generateFilters(){
  let html = "";

  Object.keys(excelData[0]).forEach(col=>{
    const vals = [...new Set(excelData.map(r=>r[col]))];

    html += `
    <div class="mb-3">
      
      <!-- Header + Buttons -->
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label class="fw-semibold mb-0">${col}</label>
        <div>
          <button class="btn btn-sm btn-outline-primary select-all" data-col="${col}">All</button>
          <button class="btn btn-sm btn-outline-danger clear-all" data-col="${col}">Clear</button>
        </div>
      </div>

      <!-- Checkbox List -->
      <div class="border rounded p-2" style="max-height:200px; overflow:auto;">
        ${vals.map((v,i)=>`
          <div class="form-check">
            <input class="form-check-input filter-checkbox" 
                   type="checkbox" 
                   value="${v}" 
                   data-col="${col}" 
                   id="${col}_${i}">
            <label class="form-check-label" for="${col}_${i}">
              ${v}
            </label>
          </div>
        `).join("")}
      </div>

    </div>`;
  });

  filterArea.innerHTML = html;
}

// Filter logic

//     return [...document.querySelectorAll('.filter')].every(f=>{
//       const selected=[...f.selectedOptions].map(o=>o.value);
//       if(!selected.length) return true;

//     });

document.addEventListener('click', e => {

  // SELECT ALL
  if(e.target.classList.contains('select-all')){
    const col = e.target.dataset.col;

    document.querySelectorAll(`.filter-checkbox[data-col="${col}"]`)
      .forEach(cb => cb.checked = true);
  }

  // CLEAR ALL
  if(e.target.classList.contains('clear-all')){
    const col = e.target.dataset.col;

    document.querySelectorAll(`.filter-checkbox[data-col="${col}"]`)
      .forEach(cb => cb.checked = false);
  }

});

function getFiltered(){
  return excelData.filter(row => {

    return Object.keys(excelData[0]).every(col => {

      const checked = [
        ...document.querySelectorAll(`.filter-checkbox[data-col="${col}"]:checked`)
      ].map(cb => cb.value);

      if(!checked.length) return true;

      return checked.includes(String(row[col]));

    });

  });
}

// PROCESS FUNCTION
function processData(){

    // 🚨 CHECK: No file loaded
  if(!excelData || excelData.length === 0){
    alertError("Please upload an Excel file first!");
    return;
  }

  const headerInputs = document.querySelectorAll('.header');
  const mappingInputs = document.querySelectorAll('.mapping');
  const filtered = getFiltered();

    // 🚨 CHECK: No data after filter
  if(!filtered.length){
    alert("⚠️ No data found after applying filters!");
    return;
  }

  tableData = filtered.map((row,rowIndex)=>{
    let obj = {};
    obj["SL"] = rowIndex + 1;

    mappingInputs.forEach((m,i)=>{
      let header = headerInputs[i].value.trim();
      if(!header){
        header = "Column " + (i+1);
      }
      if(obj.hasOwnProperty(header)){
        header = header + "_" + (i+1);
      }
      let text = m.value;
      text = text.replace(/<([^>]+)>/g,(match,col)=>{
        return row[col.trim()] ?? "";
      });
      text = text.replace(/\n/g, "\n");
      obj[header] = text;
    });
    return obj;
  });

  // Reset columnPercent based on new headers
  const keys = Object.keys(tableData[0]);
  if(Object.keys(columnPercent).length !== keys.length) {
    columnPercent = {};
    keys.forEach(k => {
      columnPercent[k] = 100 / keys.length;
    });
  }

  renderTable();
}

// Render
function renderTable(){
  if(!tableData.length) return;
  const keys = Object.keys(tableData[0]);
  let html="<thead><table>";
  keys.forEach(k=>{
    html+=`<th style="background:#e0e0e0;font-weight:bold;" onclick="sortTable('${k}')">${k}</th>`;
  });
  html+="</tr></thead><tbody>";
  tableData.forEach(row=>{
    html+="<tr>";
    keys.forEach(k=>{
      html+=`<td>${row[k] ?? ""}</td>`;
    });
    html+="</tr>";
  });
  html+="</tbody>";
  resultTable.innerHTML=html;
}

// Sort
function sortTable(col){
  sortDirection[col]=!sortDirection[col];
  tableData.sort((a,b)=>{
    if(a[col]<b[col]) return sortDirection[col]?-1:1;
    if(a[col]>b[col]) return sortDirection[col]?1:-1;
    return 0;
  });
  tableData.forEach((r,i)=> r.SL=i+1);
  renderTable();
}

// PDF - FIXED VERSION
function downloadPDF(){
  if(!tableData.length) return alert("No data");

  const btn = document.getElementById("pdfBtn");
  const text = btn.querySelector(".btn-text");
  const spinner = btn.querySelector(".spinner-border");

  text.classList.add("d-none");
  spinner.classList.remove("d-none");
  btn.disabled = true;

  setTimeout(() => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const subject = document.getElementById('subjectText').value || "";
    const keys = Object.keys(tableData[0]);
    const fontSize = Number(document.getElementById('fontSize').value);
    const repeatSubject = document.getElementById('repeatSubject').checked;
    let subjectAlign = document.querySelector('.align-btn.active')?.dataset.align || "left";

    const pageWidth = doc.internal.pageSize.getWidth();
    const usableWidth = pageWidth - 20;

    // Calculate column widths based on percentages
    let totalPercent = 0;
    let validPercentages = true;
    
    keys.forEach(k => {
      let percent = columnPercent[k];
      if (!percent || percent <= 0 || isNaN(percent)) {
        validPercentages = false;
      } else {
        totalPercent += percent;
      }
    });
    
    // If percentages are invalid or not set, distribute equally
    let columnWidths = [];
    if (validPercentages && Math.abs(totalPercent - 100) < 0.1) {
      // Use the stored percentages
      keys.forEach(k => {
        let width = (columnPercent[k] / 100) * usableWidth;
        columnWidths.push(width);
      });
    } else {
      // Distribute equally
      let equalWidth = usableWidth / keys.length;
      keys.forEach(() => columnWidths.push(equalWidth));
    }
    
    // Calculate start position to center the table
    let totalWidth = columnWidths.reduce((a, b) => a + b, 0);
    let startX = (pageWidth - totalWidth) / 2;
    if (startX < 10) startX = 10;

    function drawSubject(){
      doc.setFontSize(fontSize + 2);
      const lines = doc.splitTextToSize(subject, usableWidth);
      
      if(subjectAlign === "center"){
        doc.text(lines, pageWidth / 2, 10, { align: "center" });
      } else if(subjectAlign === "right"){
        doc.text(lines, pageWidth - 10, 10, { align: "right" });
      } else {
        doc.text(lines, 10, 10);
      }
      return 10 + (lines.length * (fontSize + 1));
    }

    const startY = drawSubject() + 5;
    
    // Prepare column styles for autoTable
    let columnStyles = {};
    columnWidths.forEach((width, idx) => {
      columnStyles[idx] = { cellWidth: width };
    });

    doc.autoTable({
      head: [keys],
      body: tableData.map(r => keys.map(k => r[k])),
      startY: startY,
      margin: { left: startX, right: pageWidth - startX - totalWidth },
      styles: {
        fontSize: fontSize,
        lineWidth: 0.2,
        lineColor: [0,0,0],
        cellPadding: 2,
        overflow: 'linebreak',
        valign: 'middle'
      },
      headStyles: {
        fillColor: [200,200,200],
        textColor: [0,0,0],
        fontStyle: 'bold',
        lineWidth: 0.3,
        halign: 'center',
        valign: 'middle'
      },
      columnStyles: columnStyles,
      rowPageBreak: 'avoid',
      didDrawPage: (data) => {
        if(repeatSubject && data.pageNumber > 1){
          doc.setFontSize(fontSize + 2);
          const lines = doc.splitTextToSize(subject, usableWidth);
          if(subjectAlign === "center"){
            doc.text(lines, pageWidth / 2, 10, { align: "center" });
          } else if(subjectAlign === "right"){
            doc.text(lines, pageWidth - 10, 10, { align: "right" });
          } else {
            doc.text(lines, 10, 10);
          }
        }
      }
    });

    doc.save("report.pdf");
    
    text.classList.remove("d-none");
    spinner.classList.add("d-none");
    btn.disabled = false;
  }, 100);
}

// Excel
function downloadExcel(){
  if(!tableData.length) return alert("No data");
  const cleanData = tableData.map(row => {
    let obj = {};
    Object.keys(row).forEach(k => {
      obj[k] = String(row[k]).replace(/<br>/g, "\n");
    });
    return obj;
  });
  const ws = XLSX.utils.json_to_sheet(cleanData);
  Object.keys(ws).forEach(cell => {
    if(cell[0] === '!') return;
    ws[cell].s = { alignment: { wrapText: true } };
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");
  XLSX.writeFile(wb, "report.xlsx");
}

// Open Distribution Modal
function openDistribution(){
  if(!tableData.length) return alert("Generate table first");
  const keys = Object.keys(tableData[0]);
  let html = "";
  keys.forEach(k=>{
    let percentValue = columnPercent[k] || '';
    html += `
      <div class="mb-3">
        <label class="fw-semibold">${k}</label>
        <input type="number" class="form-control dist-input" 
          data-col="${k}" value="${percentValue}" placeholder="%" step="any">
      </div>
    `;
  });
  document.getElementById('distBody').innerHTML = html;
  new bootstrap.Modal(document.getElementById('distModal')).show();
}

// Save Distribution Percentages
function saveDistribution(){
  const inputs = document.querySelectorAll('.dist-input');
  let total = 0;
  let newPercent = {};
  
  inputs.forEach(i=>{
    let val = parseFloat(i.value) || 0;
    newPercent[i.dataset.col] = val;
    total += val;
  });
  
  // Normalize to 100% if total is not 100
  if(Math.abs(total - 100) > 0.01 && total > 0){
    const ratio = 100 / total;
    inputs.forEach(i=>{
      newPercent[i.dataset.col] = parseFloat((newPercent[i.dataset.col] * ratio).toFixed(2));
    });
  } else if(total === 0){
    // Equal distribution if all zeros
    const keys = Object.keys(newPercent);
    const equalValue = parseFloat((100 / keys.length).toFixed(2));
    keys.forEach(k => {
      newPercent[k] = equalValue;
    });
  }
  
  columnPercent = newPercent;
  
  // Update display values
  inputs.forEach(i=>{
    i.value = columnPercent[i.dataset.col];
  });
  
  alert("Column distribution saved!");
  bootstrap.Modal.getInstance(document.getElementById('distModal')).hide();
}

// Initialize
window.onload=()=>{
  addColumn();
  
  // Alignment button event listeners
  document.querySelectorAll('.align-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      document.querySelectorAll('.align-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
    });
  });
};
</script>
