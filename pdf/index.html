<html lang="en">
  <head>

    <style>
        /* particles background style (kept as reference, but no external dependency) */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0514e4a8 0%, #00ee9f63 100%);
        }
        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 150px;
            border: 2px dashed #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .image-preview-container.empty {
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .image-preview {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .image-preview .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .image-preview .rotate-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: #00070f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .image-preview .crop-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .slider-container {
            margin-bottom: 15px;
        }

        .slider-label {
            font-weight: bold;
            margin-right: 10px;
        }

        .progress {
            height: 10px;
            margin-bottom: 15px;
        }

        .drop-text {
            color: #6c757d;
            text-align: center;
        }

        .settings-panel {
            background: linear-gradient(245deg, #00eeffcc, #ff00c8da, #007bffde);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .preview-modal-img {
            max-width: 100%;
            max-height: 70vh;
        }

        .image-count-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            display: flex;
            justify-content: space-around;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .image-preview:hover .image-controls {
            opacity: 1;
        }

        .image-controls button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .pdf-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #007bff;
            color: white;
            border-radius: 3px;
            padding: 2px 5px;
            font-size: 10px;
            z-index: 5;
        }
        
        .page-number {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background-color: rgba(0,0,0,0.7);
            color: white;
            border-radius: 3px;
            padding: 2px 5px;
            font-size: 10px;
            z-index: 5;
        }
        /* floating button styles minimal */
        .sg-floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #0d6efd;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s;
        }
        .sg-floating-btn .fa-xmark {
            display: none;
        }
        .sg-floating-btn.active .fa-bars {
            display: none;
        }
        .sg-floating-btn.active .fa-xmark {
            display: inline-block;
        }



    </style>
  </head>
  <body>

        <div class="glass-card p-1 rounded text-center" style="background-color: #ffffffb2;">

        <!-- PDF Preview Modal -->

            <div class="modal-dialog modal-xl">
                <div class="modal-content">

                    <!-- Removed Total PDFs Converted badge/counter line completely -->
                    <!-- Settings Panel -->
                    <div class="settings-panel mb-4">
                        <h5 class="mb-3">PDF Settings</h5>
                        <div class="row g-1">

                                <div class="mb-3">
                                    <label for="pageSize" class="form-label">Page Size</label>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script>
        // Set worker for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Variables for image adjustments
        let brightness = 1;
        let contrast = 1;
        let saturation = 1;
        let grayscale = false;
        let cropper = null;
        let currentCropImageIndex = null;



        // Handle file input and preview generation
        document.getElementById('fileInput').addEventListener('change', function () {
            handleFiles(this.files);
        });

        const dropArea = document.getElementById('imagePreview');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            dropArea.classList.add('bg-light', 'bg-opacity-25');
        }

        function unhighlight() {
            dropArea.classList.remove('bg-light', 'bg-opacity-25');
        }

        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        async function handleFiles(files) {
            const fileList = Array.from(files);
            const previewContainer = document.getElementById('imagePreview');
            
            if (fileList.length > 0) {
                previewContainer.classList.remove('empty');
                const dropText = previewContainer.querySelector('.drop-text');
                if (dropText) dropText.remove();
            }

            for (const file of fileList) {
                if (file.type === 'application/pdf') {
                    await processPDFFile(file);
                } 
                else if (file.type.match('image.*')) {
                    processImageFile(file);
                } else {
                    alert(`File "${file.name}" is not supported. Please select only image or PDF files.`);
                }
            }

            if (previewContainer.children.length > 0) {
                new Sortable(previewContainer, {
                    animation: 150,
                    onEnd: function() { updateImageCount(); }
                });
            }
            updateImageCount();
        }

        function processImageFile(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                addImagePreview(e.target.result, 'image');
            };
            reader.readAsDataURL(file);
        }

        async function processPDFFile(file) {
            const reader = new FileReader();
            reader.onload = async function (e) {
                const pdfData = new Uint8Array(e.target.result);
                try {
                    const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
                    const numPages = pdf.numPages;
                    const progressBar = document.getElementById('conversionProgress');
                    progressBar.classList.remove('d-none');
                    for (let i = 1; i <= numPages; i++) {
                        const progressPercent = (i / numPages) * 100;
                        progressBar.querySelector('.progress-bar').style.width = `${progressPercent}%`;
                        const page = await pdf.getPage(i);
                        const scale = 1.5;
                        const viewport = page.getViewport({ scale: scale });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        const imgData = canvas.toDataURL('image/jpeg', 0.9);
                        addImagePreview(imgData, 'pdf', i, numPages);
                    }
                    progressBar.classList.add('d-none');
                } catch (error) {
                    console.error('Error processing PDF:', error);
                    alert(`Error processing PDF file "${file.name}": ${error.message}`);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function addImagePreview(imgSrc, sourceType = 'image', pageNum = null, totalPages = null) {
            const previewContainer = document.getElementById('imagePreview');
            const dropText = previewContainer.querySelector('.drop-text');
            if (dropText) dropText.remove();
            
            const div = document.createElement('div');
            div.className = 'image-preview';
            div.dataset.rotation = 0;
            div.dataset.source = sourceType;

            let badgeHtml = '';
            if (sourceType === 'pdf') {
                badgeHtml = `<div class="pdf-badge">PDF</div>`;
                if (pageNum) {
                    badgeHtml += `<div class="page-number">Page ${pageNum}${totalPages ? '/' + totalPages : ''}</div>`;
                }
            }

            div.innerHTML = `
                <img src="${imgSrc}" alt="Preview">
                ${badgeHtml}
                <button class="remove-btn" title="Remove">&times;</button>
                <div class="image-controls">
                    <button class="rotate-left-btn" title="Rotate Left"><i class="fas fa-undo"></i></button>
                    <button class="rotate-right-btn" title="Rotate Right"><i class="fas fa-redo"></i></button>
                    <button class="crop-btn" title="Crop"><i class="fas fa-crop"></i></button>
                </div>
            `;
            previewContainer.appendChild(div);
        }

        function updateImageCount() {
            const previews = document.querySelectorAll('.image-preview');
            const count = previews.length;
            const container = document.getElementById('imagePreview');
            if (count > 0) {
                container.classList.remove('empty');
            } else {
                container.classList.add('empty');
                if (!container.querySelector('.drop-text')) {
                    container.innerHTML = '<div class="drop-text">Drag & drop images or PDF files here or click to browse</div>';
                }
            }
        }

        document.getElementById('imagePreview').addEventListener('click', function (e) {
            if (e.target.classList.contains('remove-btn') || e.target.parentElement?.classList.contains('remove-btn')) {
                const btn = e.target.classList.contains('remove-btn') ? e.target : e.target.parentElement;
                btn.closest('.image-preview').remove();
                updateImageCount();
            }
            if (e.target.classList.contains('rotate-left-btn') || e.target.parentElement?.classList.contains('rotate-left-btn')) {
                const btn = e.target.classList.contains('rotate-left-btn') ? e.target : e.target.parentElement;
                rotateImage(btn.closest('.image-preview'), -90);
            }
            if (e.target.classList.contains('rotate-right-btn') || e.target.parentElement?.classList.contains('rotate-right-btn')) {
                const btn = e.target.classList.contains('rotate-right-btn') ? e.target : e.target.parentElement;
                rotateImage(btn.closest('.image-preview'), 90);
            }
            if (e.target.classList.contains('crop-btn') || e.target.parentElement?.classList.contains('crop-btn')) {
                const btn = e.target.classList.contains('crop-btn') ? e.target : e.target.parentElement;
                openCropModal(btn.closest('.image-preview'));
            }
        });

        function rotateImage(previewElement, degrees) {
            const img = previewElement.querySelector('img');
            const currentRotation = parseInt(previewElement.dataset.rotation) || 0;
            const newRotation = (currentRotation + degrees) % 360;
            previewElement.dataset.rotation = newRotation;
            img.style.transform = `rotate(${newRotation}deg)`;
        }

        function openCropModal(previewElement) {
            const img = previewElement.querySelector('img');
            const modal = new bootstrap.Modal(document.getElementById('cropModal'));
            const cropImage = document.getElementById('cropImage');
            cropImage.src = img.src;
            currentCropImageIndex = Array.from(document.querySelectorAll('.image-preview')).indexOf(previewElement);
            modal.show();
            document.getElementById('cropModal').addEventListener('shown.bs.modal', function () {
                if (cropper) cropper.destroy();
                cropper = new Cropper(cropImage, {
                    aspectRatio: NaN,
                    viewMode: 1,
                    autoCropArea: 0.8,
                    responsive: true,
                });
            }, { once: true });
        }

        document.getElementById('applyCropBtn').addEventListener('click', function() {
            if (cropper) {
                const canvas = cropper.getCroppedCanvas();
                const dataURL = canvas.toDataURL();
                const previews = document.querySelectorAll('.image-preview');
                if (previews[currentCropImageIndex]) {
                    previews[currentCropImageIndex].querySelector('img').src = dataURL;
                }
                bootstrap.Modal.getInstance(document.getElementById('cropModal')).hide();
                cropper.destroy();
                cropper = null;
            }
        });

        document.getElementById('brightness').addEventListener('input', function () {
            brightness = parseFloat(this.value);
            document.getElementById('brightnessValue').textContent = brightness.toFixed(2);
            updateImageFilters();
        });
        document.getElementById('contrast').addEventListener('input', function () {
            contrast = parseFloat(this.value);
            document.getElementById('contrastValue').textContent = contrast.toFixed(2);
            updateImageFilters();
        });
        document.getElementById('saturation').addEventListener('input', function () {
            saturation = parseFloat(this.value);
            document.getElementById('saturationValue').textContent = saturation.toFixed(2);
            updateImageFilters();
        });
        document.getElementById('grayscale').addEventListener('change', function () {
            grayscale = this.checked;
            updateImageFilters();
        });

        function updateImageFilters() {
            const images = document.querySelectorAll('#imagePreview img');
            images.forEach(img => {
                let filter = `brightness(${brightness}) contrast(${contrast}) saturate(${saturation})`;
                if (grayscale) filter += ' grayscale(1)';
                img.style.filter = filter;
            });
        }

        async function generatePDF(download = true) {
            const { jsPDF } = window.jspdf;
            const pageSize = document.getElementById('pageSize').value;
            const quality = parseFloat(document.getElementById('quality').value);
            let pdf;
            switch(pageSize) {
                case 'a4': pdf = new jsPDF('p', 'mm', 'a4'); break;
                case 'letter': pdf = new jsPDF('p', 'mm', 'letter'); break;
                case 'legal': pdf = new jsPDF('p', 'mm', 'legal'); break;
                case 'a3': pdf = new jsPDF('p', 'mm', 'a3'); break;
                default: pdf = new jsPDF('p', 'mm', 'a4');
            }
            const previews = Array.from(document.querySelectorAll('.image-preview img'));
            if (previews.length === 0) {
                alert("Please add images or PDF pages!");
                return null;
            }
            const progressBar = document.getElementById('conversionProgress');
            progressBar.classList.remove('d-none');
            let processed = 0;
            const total = previews.length;
            
            const processImage = (index) => {
                return new Promise((resolve) => {
                    const img = previews[index];
                    const previewElement = img.closest('.image-preview');
                    const rotation = parseInt(previewElement.dataset.rotation) || 0;
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const imgElement = new Image();
                    imgElement.src = img.src;
                    imgElement.onload = function () {
                        canvas.width = imgElement.width;
                        canvas.height = imgElement.height;
                        ctx.filter = `brightness(${brightness}) contrast(${contrast}) saturate(${saturation}) ${grayscale ? 'grayscale(1)' : ''}`;
                        if (rotation !== 0) {
                            ctx.save();
                            ctx.translate(canvas.width / 2, canvas.height / 2);
                            ctx.rotate(rotation * Math.PI / 180);
                            ctx.drawImage(imgElement, -imgElement.width / 2, -imgElement.height / 2);
                            ctx.restore();
                        } else {
                            ctx.drawImage(imgElement, 0, 0);
                        }
                        const imgData = canvas.toDataURL("image/jpeg", quality);
                        const pageWidth = pdf.internal.pageSize.width;
                        const pageHeight = pdf.internal.pageSize.height;
                        let imgWidth = pageWidth - 20;
                        let imgHeight = (imgElement.height * imgWidth) / imgElement.width;
                        if (imgHeight > pageHeight - 20) {
                            imgHeight = pageHeight - 20;
                            imgWidth = (imgElement.width * imgHeight) / imgElement.height;
                        }
                        const x = (pageWidth - imgWidth) / 2;
                        const y = (pageHeight - imgHeight) / 2;
                        if (index > 0) pdf.addPage();
                        pdf.addImage(imgData, 'JPEG', x, y, imgWidth, imgHeight);
                        processed++;
                        const progressPercent = (processed / total) * 100;
                        progressBar.querySelector('.progress-bar').style.width = `${progressPercent}%`;
                        resolve();
                    };
                });
            };
            
            for (let i = 0; i < previews.length; i++) {
                await processImage(i);
            }
            progressBar.classList.add('d-none');
            if (download) {
                pdf.save("converted-images.pdf");
            }
            return pdf;
        }

        document.getElementById('convertBtn').addEventListener('click', function () {
            generatePDF(true);
        });

        document.getElementById('previewBtn').addEventListener('click', async function () {
            const pdf = await generatePDF(false);
            if (pdf) {
                const pdfBlob = pdf.output('blob');
                const pdfUrl = URL.createObjectURL(pdfBlob);
                const previewContainer = document.getElementById('pdfPreview');
                previewContainer.innerHTML = `<embed src="${pdfUrl}" type="application/pdf" width="100%" height="500px"><p class="mt-2"><small>Note: Preview may vary slightly from the final downloaded PDF</small></p>`;
                const previewModal = new bootstrap.Modal(document.getElementById('previewModal'));
                previewModal.show();
                document.getElementById('downloadPdfBtn').onclick = function() {
                    pdf.save("converted-images.pdf");
                    previewModal.hide();
                };
            }
        });

        // Simulate offline detection (optional, keeping initial offline modal style)
        window.addEventListener('offline', () => {
            const offlineModal = new bootstrap.Modal(document.getElementById('offlineModal'));
            offlineModal.show();
        });
        

    </script>

  </body>
</html>
