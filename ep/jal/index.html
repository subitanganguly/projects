<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GR Entry</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#002357">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    body { background: #ececec; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 16px 0; }
    .app-container { max-width: 500px; margin: 0 auto; }
    .card { border: none; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06), inset 0 0px 20px rgba(117, 117, 117, 0.788); }
    .card-header { background: transparent; border-bottom: none; padding: 1rem 1.25rem 0.25rem 1.25rem; }
    .card-body { padding: 1rem 1.25rem 1.25rem; }
    .form-control { border-radius: 16px; border: 1.5px solid #e2e8f0; padding: 0.6rem 0.9rem; font-weight: 450; background: #fafbfc; font-size: 0.95rem; }
    .form-control:focus { border-color: #818cf8; box-shadow: 0 0 0 4px rgba(99,102,241,0.10); }
    .form-control-sm { padding: 0.4rem 0.7rem; font-size: 0.85rem; }
    .btn { border-radius: 40px; font-weight: 600; padding: 0.6rem 1.5rem; }
    .btn-primary { background: #4f46e5; border: none; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25); }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-outline-secondary { border-color: #e2e8f0; color: #1e293b; }
    .btn-outline-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
    .badge-soft { background: #eef2ff; color: #4f46e5; font-weight: 500; padding: 0.25rem 0.9rem; border-radius: 40px; font-size: 0.75rem; }
    .chip-grid-5 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 6px; }
    .chip-grid-5 .btn { width: 100%; min-height: 32px; padding: 0; border-radius: 12px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; justify-content: center; text-align: center; white-space: nowrap; }
    .chip-grid-5 .btn-primary { background: #4f46e5; color: white; box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2); }
    .chip-grid-5 .btn-outline-secondary { background: transparent; border: 1.5px solid #e2e8f0; }
    #psButtons .btn { font-size: 0.65rem; height: 40px; display: flex; align-items: center; justify-content: center; }
    #firScrollWrapper {
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding: 4px 0 8px 0;
      margin: 4px -4px 0 -4px;
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f1f5f9;
    }
    #firScrollWrapper::-webkit-scrollbar { height: 6px; }
    #firScrollWrapper::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 12px; }
    #firScrollWrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 12px; }
    #firScrollWrapper .fir-chip {
      flex: 0 0 auto;
      min-width: 48px;
      padding: 6px 10px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      background: transparent;
      border: 1.5px solid #e2e8f0;
      color: #1e293b;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
      user-select: none;
    }
    #firScrollWrapper .fir-chip:active { transform: scale(0.94); }
    #firScrollWrapper .fir-chip.active-chip { background: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 4px 10px rgba(79,70,229,0.25); }
    #firScrollWrapper .fir-chip.used-chip { opacity: 0.35; pointer-events: none; text-decoration: line-through; }
    #firScrollWrapper .fir-chip.placeholder-chip { opacity: 0.5; pointer-events: none; border-style: dashed; }
    #firScrollWrapper .fir-chip.recommended-chip { 
      background: #dcfce7; 
      border-color: #16a34a; 
      color: #14532d;
      position: relative;
    }
    #firScrollWrapper .fir-chip.recommended-chip::after {
      content: "★";
      position: absolute;
      top: -6px;
      right: -4px;
      font-size: 10px;
      color: #16a34a;
    }
    #firScrollWrapper .fir-chip.next-chip {
      background: #eef2ff;
      border-color: #4f46e5;
      color: #4f46e5;
    }
    .fir-nav-arrows {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .fir-nav-arrows .btn { padding: 0.15rem 0.5rem; font-size: 0.7rem; border-radius: 30px; }
    .lock-icon { font-size: 2.5rem; color: #4f46e5; }
    .password-input-group .btn { width: auto; }
    .mb-2 { margin-bottom: 0.6rem; }

    /* Updated label styles - no selection-label wrapper */
    .field-label {
      font-weight: 500;
      font-size: 0.8rem;
      color: #64748b;
      display: inline-block;
      margin-bottom: 2px;
    }
    .field-label .field-value {
      font-weight: 600;
      color: #0f172a;
      margin-left: 4px;
    }
    .field-label .field-placeholder {
      font-weight: 400;
      color: #94a3b8;
      margin-left: 4px;
    }

    /* Type chip grid - matching other chip styles */
    .type-chip-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 6px; 
      margin-top: 4px; 
    }
    .type-chip-grid .btn { 
      width: 100%; 
      min-height: 32px; 
      padding: 0.3rem 0.5rem; 
      border-radius: 12px; 
      font-size: 0.75rem; 
      font-weight: 600; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      text-align: center; 
      white-space: nowrap; 
    }
    .type-chip-grid .btn-primary { 
      background: #4f46e5; 
      color: white; 
      box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2); 
    }
    .type-chip-grid .btn-outline-secondary { 
      background: transparent; 
      border: 1.5px solid #e2e8f0; 
    }

    /* Remarks suggestion chips */
    #remarksScrollWrapper {
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding: 4px 0 8px 0;
      margin: 4px -4px 0 -4px;
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f1f5f9;
    }
    #remarksScrollWrapper::-webkit-scrollbar { height: 6px; }
    #remarksScrollWrapper::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 12px; }
    #remarksScrollWrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 12px; }
    #remarksScrollWrapper .remarks-chip {
      flex: 0 0 auto;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      background: transparent;
      border: 1.5px solid #e2e8f0;
      color: #1e293b;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
      user-select: none;
    }
    #remarksScrollWrapper .remarks-chip:active { transform: scale(0.94); }
    #remarksScrollWrapper .remarks-chip.active-chip { 
      background: #4f46e5; 
      color: white; 
      border-color: #4f46e5; 
      box-shadow: 0 4px 10px rgba(79,70,229,0.25); 
    }
    #remarksScrollWrapper .remarks-chip:hover { background: #f1f5f9; }

    .remarks-nav-arrows {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .remarks-nav-arrows .btn { padding: 0.15rem 0.5rem; font-size: 0.7rem; border-radius: 30px; }

    /* Two-column layout for FIR Date and Type */
    .row-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 576px) {
      .password-input-group .btn { width: 100%; }
      .chip-grid-5 { gap: 4px; }
      .chip-grid-5 .btn { font-size: 0.7rem; padding: 0.2rem 0.1rem; }
      #psButtons .btn { font-size: 0.55rem; padding: 0.15rem 0.1rem; }
      .card-body { padding: 0.75rem 1rem 1rem; }
      #firScrollWrapper .fir-chip { min-width: 40px; padding: 4px 8px; font-size: 0.7rem; }
      .type-chip-grid { grid-template-columns: repeat(2, 1fr); }
      #remarksScrollWrapper .remarks-chip { font-size: 0.65rem; padding: 3px 10px; }
      .row-two-col {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>
<body>

<div class="app-container px-3 px-sm-0">

  <!-- Navigation Links -->
  <div class="nav-links mb-1 text-center">
    <a href="index.html" class="btn btn-primary">📝 Entry</a>
    <a href="view.html" class="btn btn-secondary">📊 View & Sync</a>
  </div>

  <!-- PASSWORD CARD -->
  <div class="card mb-3" id="passwordCard">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <h5 class="fw-semibold mb-0 d-flex align-items-center gap-2">
          <i class="bi bi-lock"></i> Authentication
        </h5>
      </div>
      <div class="text-center my-2">
        <i class="bi bi-unlock lock-icon"></i>
        <p class="text-secondary small mb-0">Enter password to access GR Entry</p>
      </div>
      <div class="password-input-group d-flex flex-column flex-sm-row gap-2">
        <input type="password" id="passwordInput" class="form-control" placeholder="Enter password" style="flex:1;">
        <button id="unlockBtn" class="btn btn-primary d-flex align-items-center gap-1" style="white-space:nowrap;">
          <i class="bi bi-key"></i> Unlock
        </button>
      </div>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="rememberPassword">
        <label class="form-check-label text-secondary small" for="rememberPassword">Remember Password</label>
      </div>
      <div id="passwordStatus" class="mt-1 fw-semibold text-center small"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent" style="display:none;">

    <!-- ENTRY CARD -->
    <div class="card mb-3">
      <div class="card-header d-flex flex-wrap align-items-center justify-content-between">
        <h5 class="fw-semibold mb-0 d-flex align-items-center gap-2">
          <i class="bi bi-pencil-square"></i> Last GR
          <div id="o2Value" class="fw-bold text-primary">
          Loading...
        </div>
        </h5>
        <div class="d-flex align-items-center gap-2">
          <span class="badge-soft" id="entryCountBadge">0</span>
          <button class="btn btn-outline-secondary btn-sm" onclick="lockApp()" style="padding:0.15rem 0.6rem; color:#dc2626; font-size:0.8rem;">
            <i class="bi bi-lock"></i>
          </button>
        </div>
      </div>
      <div class="card-body">

        <!-- GR Year -->
        <div class="mb-2">
          <label class="field-label" id="grYearDisplay">
            GR Year: <span class="field-placeholder">Not Selected</span>
          </label>
          <input type="hidden" id="grYearInput" value="">
          <div class="chip-grid-5" id="yearButtons" style="grid-template-columns: repeat(3, 1fr);"></div>
        </div>

        <!-- GR No -->
        <div class="mb-2">
          <label class="fw-medium text-secondary mb-1" style="font-size:0.8rem;">GR No.</label>
          <input type="number" id="grNo" class="form-control form-control-sm" placeholder="Enter GR No" inputmode="numeric" pattern="[0-9]*">
        </div>

        <!-- PS Name -->
        <div class="mb-2">
          <label class="field-label" id="psNameDisplay">
            PS Name: <span class="field-placeholder">Not Selected</span>
          </label>
          <input type="hidden" id="psNameInput" value="">
          <div class="chip-grid-5" id="psButtons"></div>
        </div>

        <!-- FIR No -->
        <div class="mb-2">
          <label class="fw-medium text-secondary mb-1" style="font-size:0.8rem;">
            FIR No.
            <span id="firStatusBadge" class="fir-status-badge bg-secondary rounded px-1 text-white">Loading...</span>
          </label>
          <input type="number" id="firNo" class="form-control form-control-sm" placeholder="Enter FIR No" inputmode="numeric" pattern="[0-9]*">
          
          <!-- scrollable bar -->
          <div class="fir-nav-arrows d-flex justify-content-between mt-1">
            <button class="btn btn-outline-secondary btn-sm" id="firScrollLeft" style="padding:0.1rem 0.5rem;"><i class="bi bi-chevron-left"></i></button>
            <span class="small text-secondary" id="firRangeLabel">0 – 0</span>
            <button class="btn btn-outline-secondary btn-sm" id="firScrollRight" style="padding:0.1rem 0.5rem;"><i class="bi bi-chevron-right"></i></button>
          </div>
          <div id="firScrollWrapper"></div>
          <div class="small text-secondary mt-1" id="firHintText">FIR recommendations</div>
        </div>

        <!-- Additional Fields - Two Column Row -->
        <div class="row-two-col mb-2">
          <!-- FIR Registration Date -->
          <div>
            <label class="fw-medium text-secondary mb-1" style="font-size:0.8rem;">FIR Registration Date</label>
            <input id="firRgDate" class="form-control form-control-sm" placeholder="DD/MM/YYYY">
          </div>

          <!-- Type -->
          <div>
            <label class="field-label" id="typeDisplay">
              Type: <span class="field-value">Legal Options</span>
            </label>
            <input type="hidden" id="typeInput" value="Legal Options">
            <div class="type-chip-grid" id="typeButtons">
              <button type="button" class="btn btn-primary" data-value="Legal Options">⚖️ Legal Options</button>
              <button type="button" class="btn btn-outline-secondary" data-value="Charge Sheet">📄 Charge Sheet</button>
            </div>
          </div>
        </div>

        <!-- Details -->
        <!-- Details -->
        <div class="mb-2">
          <label class="fw-medium text-secondary mb-1" style="font-size:0.8rem;">
            Details
          </label>

          <textarea
            id="details"
            class="form-control form-control-sm"
            rows="2"
            placeholder="Enter case details">
       </textarea>
        </div>

        <!-- Remarks with suggestion chips -->
        <div class="mb-2">
          <label class="fw-medium text-secondary mb-1" style="font-size:0.8rem;">Remarks</label>
          <input type="text" id="remarks" class="form-control form-control-sm" placeholder="Enter remarks">
          
          <!-- scrollable suggestion bar -->
          <div class="remarks-nav-arrows d-flex justify-content-between mt-1">
            <button class="btn btn-outline-secondary btn-sm" id="remarksScrollLeft" style="padding:0.1rem 0.5rem;"><i class="bi bi-chevron-left"></i></button>
            <span class="small text-secondary" id="remarksRangeLabel">Suggestions</span>
            <button class="btn btn-outline-secondary btn-sm" id="remarksScrollRight" style="padding:0.1rem 0.5rem;"><i class="bi bi-chevron-right"></i></button>
          </div>
          <div id="remarksScrollWrapper"></div>
          <div class="small text-secondary mt-1" id="remarksHintText">💡 Click a suggestion to auto-fill</div>
        </div>

        <button id="saveBtn" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2" style="font-size:0.9rem; padding:0.5rem;">
          <i class="bi bi-save"></i> Save Entry
        </button>
        <div id="status" class="mt-1 fw-semibold text-center small"></div>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="card">
      <div class="card-body text-center">
        <p class="mb-0 text-secondary small">
          <i class="bi bi-database"></i> 
          <span id="pendingCount">0</span> entries pending sync
        </p>
        <a href="view.html" class="btn btn-sm btn-outline-primary mt-2">
          <i class="bi bi-eye"></i> View All Entries
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ---------- GLOBAL CONST ----------
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5v2gHEZURaWKxjfV26M1xMZzrYxIEFVIX9h27yQDLGwJ6MBmN-P32EzSnk2KBmuTgVA/exec";
  const FIR_CACHE_KEY = "firCache";

  (function() {
    // ---------- CONST ----------
    const currentYear = new Date().getFullYear();
    const years = [currentYear - 1, currentYear, currentYear + 1];
    const psList = [
  { btn: "BANT", value: "Banarhat" },
  { btn: "CYBER", value: "Cyber Crime" },
  { btn: "DPG", value: "Dhupguri" },
  { btn: "KOT", value: "Kotwali" },
  { btn: "MET", value: "Metelli" },
  { btn: "MNG", value: "Mainaguri" },
  { btn: "MAL", value: "Malbazar" },
  { btn: "NAG", value: "Nagrakata" },
  { btn: "RAJ", value: "Rajganj" },
  { btn: "W.PS", value: "Women PS Jalpaiguri" },
  { btn: "BHK", value: "Bhakti Nagar" },
  { btn: "NJP", value: "New Jalpaiguri PS" }
];
    const STORAGE_KEY = "grEntries";
    const EDIT_INDEX_KEY = "editIndex";
    const REMEMBER_PASSWORD_KEY = "rememberedPassword";
    const AUTH_KEY = "grAuth";

    // Remarks suggestions
    const REMARKS_SUGGESTIONS = [
      "CJM Court",
      "JM 1st",
      "JM 2nd",
      "JM 3rd",
      "Addl Sessions judge",
      "Dist. Sessions judge"

    ];

    // DOM
    const passwordCard = document.getElementById('passwordCard');
    const passwordInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const passwordStatus = document.getElementById('passwordStatus');
    const rememberCheckbox = document.getElementById('rememberPassword');
    const mainContent = document.getElementById('mainContent');
    
    const grYearInput = document.getElementById('grYearInput');
    const grNoInput = document.getElementById('grNo');
    const psNameInput = document.getElementById('psNameInput');
    const firNoInput = document.getElementById('firNo');
    const firRgDate = document.getElementById('firRgDate');
    const typeInput = document.getElementById('typeInput');
    const detailsInput = document.getElementById('details');
    const remarksInput = document.getElementById('remarks');
    const yearButtons = document.getElementById('yearButtons');
    const psButtons = document.getElementById('psButtons');
    const typeButtons = document.getElementById('typeButtons');
    const firScrollWrapper = document.getElementById('firScrollWrapper');
    const firScrollLeft = document.getElementById('firScrollLeft');
    const firScrollRight = document.getElementById('firScrollRight');
    const firRangeLabel = document.getElementById('firRangeLabel');
    const firHintText = document.getElementById('firHintText');
    const firStatusBadge = document.getElementById('firStatusBadge');
    const saveBtn = document.getElementById('saveBtn');
    const statusDiv = document.getElementById('status');
    const entryCountBadge = document.getElementById('entryCountBadge');
    const pendingCount = document.getElementById('pendingCount');

    // Display labels
    const grYearDisplay = document.getElementById('grYearDisplay');
    const psNameDisplay = document.getElementById('psNameDisplay');
    const typeDisplay = document.getElementById('typeDisplay');

    // Remarks DOM
    const remarksScrollWrapper = document.getElementById('remarksScrollWrapper');
    const remarksScrollLeft = document.getElementById('remarksScrollLeft');
    const remarksScrollRight = document.getElementById('remarksScrollRight');
    const remarksRangeLabel = document.getElementById('remarksRangeLabel');
    const remarksHintText = document.getElementById('remarksHintText');

    let isUnlocked = false;
    let firChips = [];
    let o2ValueData = null;
    let firCache = {};
    let firCacheLoaded = false;
    let currentPassword = '';

    // ---------- HELPERS ----------
    function getEntries() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function setEntries(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    function getEditIndex() {
      try { return parseInt(localStorage.getItem(EDIT_INDEX_KEY) || '-1'); } catch { return -1; }
    }
    function clearEditIndex() { localStorage.removeItem(EDIT_INDEX_KEY); }

    // ---------- FIR CACHE HELPERS ----------
    function getFirCache() {
      try { 
        const cached = localStorage.getItem(FIR_CACHE_KEY);
        if (cached) {
          const parsed = JSON.parse(cached);
          if (parsed.timestamp && (Date.now() - parsed.timestamp) < 3600000) {
            return parsed.data || {};
          }
        }
        return {};
      } catch { return {}; }
    }

    function setFirCache(data) {
      try {
        localStorage.setItem(FIR_CACHE_KEY, JSON.stringify({
          data: data,
          timestamp: Date.now()
        }));
      } catch {}
    }

    function getCacheKey(psName, grYear) {
      return `${psName}_${grYear}`.toUpperCase().replace(/\s/g, '_');
    }

    // ---------- AUTH HELPERS ----------
    function setAuthStatus(status) {
      localStorage.setItem(AUTH_KEY, JSON.stringify(status));
    }

    function getAuthStatus() {
      try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; }
    }

    function clearAuth() {
      localStorage.removeItem(AUTH_KEY);
      localStorage.removeItem(REMEMBER_PASSWORD_KEY);
    }

    function getCurrentPassword() {
      return currentPassword || localStorage.getItem(REMEMBER_PASSWORD_KEY) || '';
    }

    // ---------- UPDATE LABELS ----------
    function updateYearLabel(value) {
      if (value) {
        grYearDisplay.innerHTML = `GR Year: <span class="field-value">${value}</span>`;
      } else {
        grYearDisplay.innerHTML = `GR Year: <span class="field-placeholder">Not Selected</span>`;
      }
    }

    function updatePsLabel(value) {
      if (value) {
        psNameDisplay.innerHTML = `PS Name: <span class="field-value">${value}</span>`;
      } else {
        psNameDisplay.innerHTML = `PS Name: <span class="field-placeholder">Not Selected</span>`;
      }
    }

    function updateTypeLabel(value) {
      if (value) {
        typeDisplay.innerHTML = `Type: <span class="field-value">${value}</span>`;
      } else {
        typeDisplay.innerHTML = `Type: <span class="field-placeholder">Not Selected</span>`;
      }
    }

    // ---------- UPDATE PENDING COUNT ----------
    function updatePendingCount() {
      const entries = getEntries();
      pendingCount.textContent = entries.length;
      entryCountBadge.textContent = entries.length;
    }

    // ---------- FETCH FIR NUMBERS FROM SHEET ----------
    async function fetchFirNumbersFromSheet() {
      try {
        updateFirStatusBadge('⏳ Fetching...', 'bg-warning text-dark');
        
        const formData = new FormData();
        formData.append('action', 'getAllRecords');
        formData.append('password', getCurrentPassword());
        
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.message || 'Failed to fetch records');
        }
        
        if (data.success && data.records) {
          const newCache = {};
          const records = data.records;
          
          for (const record of records) {
            const recordPS = String(record.psName || '').trim();
            const recordYear = String(record.grYear || '').trim();
            const recordFir = parseInt(record.firNo, 10);
            
            if (recordPS && recordYear && !isNaN(recordFir)) {
              const key = getCacheKey(recordPS, recordYear);
              if (!newCache[key]) {
                newCache[key] = [];
              }
              newCache[key].push(recordFir);
            }
          }
          
          for (const key in newCache) {
            newCache[key].sort((a, b) => a - b);
          }
          
          setFirCache(newCache);
          firCache = newCache;
          firCacheLoaded = true;
          
          updateFirStatusBadge(`✅ ${records.length} entries`, 'bg-success text-white rounded px-1');
          
          return newCache;
        }
        
        return {};
      } catch (error) {
        console.error('Failed to fetch FIR numbers:', error);
        updateFirStatusBadge('⚠️ Using cached', 'bg-warning text-dark rounded px-1');
        
        const cached = getFirCache();
        if (cached && Object.keys(cached).length > 0) {
          firCache = cached;
          firCacheLoaded = true;
          updateFirStatusBadge('📦 Cached', 'bg-info text-white rounded px-1');
          return cached;
        }
        
        updateFirStatusBadge('⚠️ No data', 'bg-danger text-white rounded px-1');
        return {};
      }
    }

          o2ValueData = data.value;
          
          const entries = getEntries();

        document.getElementById("o2Value").textContent = "Unable to load";

    // ---------- AUTO FILL FROM O2 ----------
    function autoFillFromO2(o2Value) {
      const match = o2Value.match(/(\d{4})\/(\d+)/);
      if (!match) return;
      
      const year = match[1];
      const grNumber = parseInt(match[2], 10) + 1;
      
      grYearInput.value = year;
      updateYearLabel(year);
      
      yearButtons.querySelectorAll('.btn').forEach(b => {
        if (Number(b.dataset.year) === Number(year)) {
          b.className = 'btn btn-primary';
        } else {
          b.className = 'btn btn-outline-secondary';
        }
      });
      
      grNoInput.value = grNumber;
    }

    // ---------- GET RECOMMENDED FIR NUMBERS ----------
    function getRecommendedFirNumbers(psName, grYear) {
      if (!psName || !grYear) return [];
      
      const key = getCacheKey(psName, grYear);
      const usedFirs = firCache[key] || [];
      
      const entries = getEntries();
      const localUsed = entries
        .filter(e => e.psName === psName && e.grYear === grYear && e.firNo)
        .map(e => parseInt(e.firNo, 10))
        .filter(n => !isNaN(n));
      
      const allUsed = [...new Set([...usedFirs, ...localUsed])].sort((a, b) => a - b);
      
      if (allUsed.length === 0) {
        return [1, 2, 3, 4, 5];
      }
      
      const maxUsed = Math.max(...allUsed);
      const minUsed = Math.min(...allUsed);
      
      const recommendations = [];
      
      const nextNum = maxUsed + 1;
      recommendations.push(nextNum);
      
      for (let i = 1; i <= 3; i++) {
        recommendations.push(nextNum + i);
      }
      
      const maxRange = maxUsed + 5;
      const usedSet = new Set(allUsed);
      for (let i = minUsed; i <= maxRange; i++) {
        if (!usedSet.has(i) && !recommendations.includes(i)) {
          recommendations.push(i);
        }
        if (recommendations.length >= 8) break;
      }
      
      return [...new Set(recommendations)].sort((a, b) => a - b);
    }

    // ---------- GENERATE FIR NUMBERS FOR SCROLLABLE BAR ----------
    function generateFirNumbers() {
      const psName = psNameInput.value.trim();
      const grYear = grYearInput.value.trim();
      
      if (!psName || !grYear) return [];
      
      const recommendations = getRecommendedFirNumbers(psName, grYear);
      
      const allNumbers = new Set(recommendations);
      
      if (recommendations.length > 0) {
        const minRec = Math.min(...recommendations);
        const maxRec = Math.max(...recommendations);
        
        for (let i = Math.max(1, minRec - 2); i < minRec; i++) {
          if (allNumbers.size < 25) {
            allNumbers.add(i);
          }
        }
        
        for (let i = maxRec + 1; i <= maxRec + 3; i++) {
          if (allNumbers.size < 25) {
            allNumbers.add(i);
          }
        }
      }
      
      if (allNumbers.size === 0) {
        for (let i = 1; i <= 20; i++) {
          allNumbers.add(i);
        }
      }
      
      return [...allNumbers].sort((a, b) => a - b);
    }

    // ---------- RENDER FIR SCROLLABLE BAR ----------
    function renderFirBar(numbers) {
      firScrollWrapper.innerHTML = '';
      firChips = [];
      
      if (!numbers || numbers.length === 0) {
        const placeholder = document.createElement('span');
        placeholder.className = 'fir-chip placeholder-chip';
        placeholder.textContent = 'Select PS & Year';
        firScrollWrapper.appendChild(placeholder);
        firRangeLabel.textContent = '–';
        firHintText.textContent = 'FIR recommendations';
        return;
      }

      const psName = psNameInput.value.trim();
      const grYear = grYearInput.value.trim();
      const key = getCacheKey(psName, grYear);
      const usedFirs = firCache[key] || [];
      const usedSet = new Set(usedFirs);
      
      const entries = getEntries();
      const localUsed = entries
        .filter(e => e.psName === psName && e.grYear === grYear && e.firNo)
        .map(e => parseInt(e.firNo, 10))
        .filter(n => !isNaN(n));
      
      localUsed.forEach(n => usedSet.add(n));
      
      const recommendations = getRecommendedFirNumbers(psName, grYear);
      const recSet = new Set(recommendations);
      
      let nextNumber = 1;
      if (usedSet.size > 0) {
        const maxUsed = Math.max(...usedSet);
        nextNumber = maxUsed + 1;
      }
      
      numbers.forEach(num => {
        const chip = document.createElement('span');
        chip.className = 'fir-chip';
        
        if (usedSet.has(num)) {
          chip.classList.add('used-chip');
        } else if (recSet.has(num) && num === nextNumber) {
          chip.classList.add('recommended-chip');
          chip.classList.add('next-chip');
          chip.title = '⭐ Recommended: Next available FIR number';
        } else if (recSet.has(num)) {
          chip.classList.add('recommended-chip');
          chip.title = '⭐ Recommended';
        }
        
        chip.textContent = num;
        chip.dataset.value = num;
        chip.onclick = () => {
          if (chip.classList.contains('used-chip')) return;
          firNoInput.value = num;
          firScrollWrapper.querySelectorAll('.fir-chip').forEach(c => c.classList.remove('active-chip'));
          chip.classList.add('active-chip');
        };
        firScrollWrapper.appendChild(chip);
        firChips.push(chip);
      });

      if (numbers.length > 0) {
        firRangeLabel.textContent = `${numbers[0]} – ${numbers[numbers.length-1]}`;
      } else {
        firRangeLabel.textContent = '–';
      }
      
      if (usedSet.size > 0 && usedSet.size < 10) {
        firHintText.textContent = `⭐ ${usedSet.size} FIR(s) used. Recommended: ${[...recSet].slice(0, 5).join(', ')}`;
      } else if (usedSet.size >= 10) {
        firHintText.textContent = `📊 ${usedSet.size} FIRs used. Next recommended: ${nextNumber}`;
      } else {
        firHintText.textContent = '💡 No FIRs used yet. Start from 1.';
      }

      setTimeout(() => {
        const recommendedChips = firScrollWrapper.querySelectorAll('.fir-chip.recommended-chip');
        if (recommendedChips.length > 0) {
          recommendedChips[0].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }, 100);
    }

  // ---------- LOAD DATA ----------
function loadData() {
  const entries = getEntries();
  const editIndex = getEditIndex();
  
  grYearInput.value = '';
  psNameInput.value = '';
  updateYearLabel('');
  updatePsLabel('');
  firNoInput.value = '';
  firRgDate.value = '';
  typeInput.value = 'Legal Options';
  updateTypeLabel('Legal Options');
  
  // Set default details template for new entries
  const defaultDetails = `Complainant:
I.O:`;
  
  remarksInput.value = '';
  
  yearButtons.querySelectorAll('.btn').forEach(b => b.className = 'btn btn-outline-secondary');
  psButtons.querySelectorAll('.btn').forEach(b => b.className = 'btn btn-outline-secondary');
  typeButtons.querySelectorAll('.btn').forEach(b => {
    b.className = b.dataset.value === 'Legal Options' ? 'btn btn-primary' : 'btn btn-outline-secondary';
  });
  remarksScrollWrapper.querySelectorAll('.remarks-chip').forEach(c => c.classList.remove('active-chip'));

  if (editIndex >= 0 && editIndex < entries.length) {
    const entry = entries[editIndex];
    grYearInput.value = entry.grYear || '';
    psNameInput.value = entry.psName || '';
    updateYearLabel(entry.grYear || '');
    updatePsLabel(entry.psName || '');
    grNoInput.value = entry.grNo || '';
    firNoInput.value = entry.firNo || '';
    
    // FIX: Properly set FIR Registration Date
    if (entry.firRgDate) {
      // Check if it's already in DD/MM/YYYY format
      if (entry.firRgDate.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
        firRgDate.value = entry.firRgDate;
      } else {
        // Try to parse and format
        try {
          const date = new Date(entry.firRgDate);
          if (!isNaN(date.getTime())) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            firRgDate.value = `${day}/${month}/${year}`;
          }
        } catch (e) {
          firRgDate.value = entry.firRgDate || '';
        }
      }
    } else {
      firRgDate.value = '';
    }
    
    typeInput.value = entry.type || 'Legal Options';
    updateTypeLabel(entry.type || 'Legal Options');
    
    // FIX: Properly set Details - use the saved value, not default
    detailsInput.value = entry.details || '';
    remarksInput.value = entry.remarks || '';
    
    yearButtons.querySelectorAll('.btn').forEach(b => {
      if (Number(b.dataset.year) === Number(entry.grYear)) b.className = 'btn btn-primary';
      else b.className = 'btn btn-outline-secondary';
    });
    psButtons.querySelectorAll('.btn').forEach(b => {
      const psObj = psList.find(p => p.btn === b.textContent);
      if (psObj && psObj.value === entry.psName) b.className = 'btn btn-primary';
      else b.className = 'btn btn-outline-secondary';
    });
    typeButtons.querySelectorAll('.btn').forEach(b => {
      b.className = b.dataset.value === entry.type ? 'btn btn-primary' : 'btn btn-outline-secondary';
    });
    saveBtn.innerHTML = '<i class="bi bi-pencil"></i> Update Entry';
  } else {
    // New entry - set default details template
    detailsInput.value = defaultDetails;
    
    if (entries.length === 0 && o2ValueData) {
      refreshFirBar();
    } else if (entries.length > 0) {
      const lastEntry = entries[entries.length - 1];
      grNoInput.value = Number(lastEntry.grNo) + 1;
      if (lastEntry.grYear) {
        grYearInput.value = lastEntry.grYear;
        updateYearLabel(lastEntry.grYear);
        yearButtons.querySelectorAll('.btn').forEach(b => {
          if (Number(b.dataset.year) === Number(lastEntry.grYear)) b.className = 'btn btn-primary';
          else b.className = 'btn btn-outline-secondary';
        });
      }
    } else {
      grNoInput.value = 1;
    }
    saveBtn.innerHTML = '<i class="bi bi-save"></i> Save Entry';
    clearEditIndex();
  }
  refreshFirBar();
  updatePendingCount();
}

      const grYear = grYearInput.value.trim();
      const grNo = grNoInput.value.trim();
      const psName = psNameInput.value.trim();
      const firNo = firNoInput.value.trim();
      // const firRgDateVal = firRgDate.value.trim();
      let firRgDateVal = "";

if (firRgDate.value.trim()) {
    const parts = firRgDate.value.split("/"); // dd/mm/yyyy
    if (parts.length === 3) {
        const date = new Date(parts[2], parts[1] - 1, parts[0]);

        firRgDateVal = date.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "long",
            year: "numeric"
        });
    }
}
      const typeVal = typeInput.value.trim();
      const detailsVal = detailsInput.value.trim();
      const remarksVal = remarksInput.value.trim();

      if (!grYear) { alert('Select GR Year'); return; }
      if (!grNo) { alert('Enter GR No'); return; }
      if (!psName) { alert('Select PS Name'); return; }
      if (!firNo) { alert('Enter FIR No'); return; }

      const entries = getEntries();
      const editIndex = getEditIndex();
      
      const key = getCacheKey(psName, grYear);
      const firNum = parseInt(firNo, 10);
      if (!isNaN(firNum)) {
        if (!firCache[key]) {
          firCache[key] = [];
        }
        if (!firCache[key].includes(firNum)) {
          firCache[key].push(firNum);
          firCache[key].sort((a, b) => a - b);
          setFirCache(firCache);
        }
      }

      const entryData = { 
        grYear, grNo, psName, firNo, 
        firRgDate: firRgDateVal, 
        type: typeVal, 
        details: detailsVal, 
        remarks: remarksVal,
        updatedAt: new Date().toLocaleString() 
      };

      if (editIndex >= 0 && editIndex < entries.length) {
        if (entries[editIndex].createdAt) {
          entryData.createdAt = entries[editIndex].createdAt;
        } else {
          entryData.createdAt = new Date().toLocaleString();
        }
        entries[editIndex] = entryData;
        setEntries(entries);
        statusDiv.innerHTML = '✓ Entry Updated Successfully!';
        statusDiv.className = 'text-success';
        clearEditIndex();
        saveBtn.innerHTML = '<i class="bi bi-save"></i> Save Entry';
      } else {
        entryData.createdAt = new Date().toLocaleString();
        entries.push(entryData);
        setEntries(entries);
        statusDiv.innerHTML = '✓ Entry Saved Successfully!';
        statusDiv.className = 'text-success';
      }
      
      loadData();
      setTimeout(() => { 
        statusDiv.textContent = ''; 
        statusDiv.className = ''; 
      }, 3000);
    });

    // ---------- INIT ----------
    function initializeApp() {
      buildYearButtons();
      buildPSButtons();
      buildTypeButtons();
      buildRemarksSuggestions();
      loadData();
    }

    // Check auth on page load
    loadRememberedPassword();
    tryAutoUnlock();

  })();
</script>
