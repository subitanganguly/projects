<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>View & Sync · GR Entries</title>
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 16px 0; }
    .app-container { max-width: 800px; margin: 0 auto; }
    .card { border: none; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06), inset 0 0px 20px rgba(117, 117, 117, 0.788); }
    .card-header { background: transparent; border-bottom: none; padding: 1rem 1.25rem 0.25rem 1.25rem; }
    .card-body { padding: 1rem 1.25rem 1.25rem; }
    .btn { border-radius: 40px; font-weight: 600; padding: 0.6rem 1.5rem; }
    .btn-primary { background: #4f46e5; border: none; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25); }
    .btn-primary:hover { background: #4338ca; }
    .btn-success { background: #16a34a; border: none; }
    .btn-success:hover { background: #15803d; }
    .btn-danger-outline { background: transparent; border: 1.5px solid #e2e8f0; color: #b91c1c; }
    .btn-danger-outline:hover { background: #fee2e2; }
    .btn-outline-archive { background: transparent; border: 1.5px solid #4f46e5; color: #4f46e5; }
    .btn-outline-archive:hover { background: #eef2ff; }
    .badge-soft { background: #eef2ff; color: #4f46e5; font-weight: 500; padding: 0.25rem 0.9rem; border-radius: 40px; font-size: 0.75rem; }
    .table-wrap { overflow-x: auto; border-radius: 20px; }
    .table th { background: #f8fafc; color: #334155; font-weight: 600; border-bottom: 1.5px solid #e9edf2; padding: 0.6rem 0.4rem; font-size: 0.75rem; white-space: nowrap; }
    .table td { padding: 0.6rem 0.4rem; border-bottom: 1px solid #f0f2f5; vertical-align: middle; color: #1e293b; font-size: 0.75rem; }
    .table-action-btn { background: transparent; border: none; padding: 0.15rem 0.5rem; border-radius: 30px; font-weight: 500; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 3px; transition: 0.1s; }
    .table-action-btn.edit { color: #4f46e5; background: #eef2ff; }
    .table-action-btn.delete { color: #b91c1c; background: #fee2e2; }
    .table-action-btn.sync { color: #16a34a; background: #dcfce7; }
    .table-action-btn:active { opacity: 0.6; }
    .modal-content { border-radius: 40px; border: none; box-shadow: 0 32px 64px rgba(0,0,0,0.2); }
    .modal-header, .modal-footer { border: none; }
    .modal-icon { font-size: 3.5rem; line-height: 1; }
    .progress { height: 6px; border-radius: 40px; background: #e2e8f0; }
    .progress-bar { background: linear-gradient(90deg, #4f46e5, #818cf8); border-radius: 40px; }
    .lock-icon { font-size: 2.5rem; color: #4f46e5; }
    .password-input-group .btn { width: auto; }
    .nav-links { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
    .nav-links .btn { padding: 0.4rem 1.2rem; font-size: 0.85rem; }
    .stats-bar { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
    .stat-item { background: white; padding: 8px 16px; border-radius: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-item .number { font-weight: 700; font-size: 1.2rem; color: #4f46e5; }
    .stat-item .label { font-size: 0.7rem; color: #64748b; }
    @media (max-width: 576px) {
      .password-input-group .btn { width: 100%; }
      .card-body { padding: 0.75rem 1rem 1rem; }
      .table th, .table td { font-size: 0.65rem; padding: 0.4rem 0.2rem; }
      .stats-bar { gap: 8px; }
      .stat-item { padding: 6px 12px; }
      .stat-item .number { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="app-container px-3 px-sm-0">

  <!-- Navigation Links -->
  <div class="nav-links">
    <a href="index.html" class="btn btn-outline-secondary">📝 Entry</a>
    <a href="view.html" class="btn btn-primary">📊 View & Sync</a>
    <a href="archive.html" class="btn btn-outline-secondary">📦 Archive</a>
  </div>

  <!-- PASSWORD CARD -->
  <div class="card mb-3" id="passwordCard">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <h5 class="fw-semibold mb-0 d-flex align-items-center gap-2">
          <i class="bi bi-lock"></i> Authentication
        </h5>
      </div>
      <div class="text-center my-2">
        <i class="bi bi-unlock lock-icon"></i>
        <p class="text-secondary small mb-0">Enter password to access GR Entries</p>
      </div>
      <div class="password-input-group d-flex flex-column flex-sm-row gap-2">
        <input type="password" id="passwordInput" class="form-control" placeholder="Enter password" style="flex:1;">
        <button id="unlockBtn" class="btn btn-primary d-flex align-items-center gap-1" style="white-space:nowrap;">
          <i class="bi bi-key"></i> Unlock
        </button>
      </div>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="rememberPassword">
        <label class="form-check-label text-secondary small" for="rememberPassword">Remember Password</label>
      </div>
      <div id="passwordStatus" class="mt-1 fw-semibold text-center small"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent" style="display:none;">

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="number" id="totalCount">0</span>
        <span class="label">Total Entries</span>
      </div>
      <div class="stat-item">
        <span class="number" id="pendingSyncCount">0</span>
        <span class="label">Pending Sync</span>
      </div>
      <div class="stat-item">
        <span class="number" id="archivedCount">0</span>
        <span class="label">Archived</span>
      </div>
    </div>

    <!-- VIEW CARD -->
    <div class="card">
      <div class="card-header d-flex flex-wrap align-items-center justify-content-between">
        <h5 class="fw-semibold mb-0 d-flex align-items-center gap-2">
          <i class="bi bi-list-ul"></i> Entries
        </h5>
        <div class="d-flex gap-1 flex-wrap">
          <button class="btn btn-sm btn-success d-flex align-items-center gap-1" onclick="syncAllToSheet()" id="syncAllBtn" style="font-size:0.75rem; padding:0.2rem 0.6rem;">
            <i class="bi bi-cloud-sync"></i> Sync All (FIFO)
          </button>
          <button class="btn btn-sm btn-outline-archive d-flex align-items-center gap-1" onclick="downloadExcel()" style="font-size:0.75rem; padding:0.2rem 0.6rem;">
            <i class="bi bi-file-earmark-excel"></i> Excel
          </button>
          <button class="btn btn-sm btn-danger-outline d-flex align-items-center gap-1" onclick="clearAll()" style="font-size:0.75rem; padding:0.2rem 0.6rem;">
            <i class="bi bi-trash"></i> Clear All
          </button>
        </div>
      </div>
      <div class="card-body" style="padding:0.5rem 0.75rem 0.75rem;">
        <div class="table-wrap">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Year</th>
                <th>No</th>
                <th>PS</th>
                <th>FIR</th>
                <th>Date</th>
                <th>Type</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="appModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center p-4">
          <div class="modal-icon" id="modalIcon">✅</div>
          <h5 class="modal-title fw-semibold mt-2" id="modalTitle">Success</h5>
          <p class="text-secondary small" id="modalDesc">Operation completed.</p>
          <div id="progressContainer" style="display:none;">
            <div class="progress mt-3">
              <div class="progress-bar" id="progressFill" style="width:0%;"></div>
            </div>
            <div class="mt-1 fw-medium text-secondary small" id="progressText">0%</div>
          </div>
        </div>
        <div class="modal-footer justify-content-center border-0 pb-4">
          <button class="btn btn-primary px-5" id="modalBtn" style="font-size:0.9rem;">OK</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  (function() {
    // ---------- CONST ----------
    const STORAGE_KEY = "grEntries";
    const ARCHIVE_KEY = "grArchive";
    const EDIT_INDEX_KEY = "editIndex";
    const REMEMBER_PASSWORD_KEY = "rememberedPassword";
    const AUTH_KEY = "grAuth";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5v2gHEZURaWKxjfV26M1xMZzrYxIEFVIX9h27yQDLGwJ6MBmN-P32EzSnk2KBmuTgVA/exec";

    // DOM
    const passwordCard = document.getElementById('passwordCard');
    const passwordInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const passwordStatus = document.getElementById('passwordStatus');
    const rememberCheckbox = document.getElementById('rememberPassword');
    const mainContent = document.getElementById('mainContent');
    const tableBody = document.getElementById('tableBody');
    const syncAllBtn = document.getElementById('syncAllBtn');
    const totalCount = document.getElementById('totalCount');
    const pendingSyncCount = document.getElementById('pendingSyncCount');
    const archivedCount = document.getElementById('archivedCount');

    // Modal elements
    const modalEl = document.getElementById('appModal');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');
    const modalBtn = document.getElementById('modalBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    let isSyncing = false;
    let isUnlocked = false;
    let modalInstance = null;
    let currentPassword = '';

    // ---------- HELPERS ----------
    function getEntries() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function setEntries(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    
    function getArchive() {
      try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]'); } catch { return []; }
    }
    function setArchive(archive) { localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive)); }

    function getEditIndex() {
      try { return parseInt(localStorage.getItem(EDIT_INDEX_KEY) || '-1'); } catch { return -1; }
    }

    function getCurrentPassword() {
      return currentPassword || localStorage.getItem(REMEMBER_PASSWORD_KEY) || '';
    }

    // ---------- AUTH ----------
    function setAuthStatus(status) { localStorage.setItem(AUTH_KEY, JSON.stringify(status)); }
    function getAuthStatus() { try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; } }
    function clearAuth() { localStorage.removeItem(AUTH_KEY); localStorage.removeItem(REMEMBER_PASSWORD_KEY); }

    // ---------- UPDATE STATS ----------
    function updateStats() {
      const entries = getEntries();
      const archive = getArchive();
      totalCount.textContent = entries.length;
      pendingSyncCount.textContent = entries.length;
      archivedCount.textContent = archive.length;
    }

    // ---------- PASSWORD ----------
    function loadRememberedPassword() {
      const saved = localStorage.getItem(REMEMBER_PASSWORD_KEY);
      if (saved) { 
        passwordInput.value = saved; 
        rememberCheckbox.checked = true;
        currentPassword = saved;
      }
    }
    function saveRememberedPassword(password) {
      currentPassword = password;
      if (rememberCheckbox.checked) localStorage.setItem(REMEMBER_PASSWORD_KEY, password);
      else localStorage.removeItem(REMEMBER_PASSWORD_KEY);
    }

    function unlockApp() {
      isUnlocked = true;
      setAuthStatus({ unlocked: true, timestamp: Date.now() });
      passwordCard.style.display = 'none';
      mainContent.style.display = 'block';
      renderTable();
      updateStats();
    }

    unlockBtn.addEventListener('click', async function() {
      const password = passwordInput.value.trim();
      if (!password) { passwordStatus.textContent = '⚠️ Please enter password'; passwordStatus.className = 'text-danger'; return; }
      unlockBtn.disabled = true;
      unlockBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span> Checking...';
      passwordStatus.textContent = '⏳ Verifying...';
      passwordStatus.className = '';
      try {
        const formData = new FormData();
        formData.append('action', 'verifyPassword');
        formData.append('password', password);
        await fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
        passwordStatus.textContent = '✅ Access granted!';
        passwordStatus.className = 'text-success';
        saveRememberedPassword(password);
        unlockApp();
      } catch (error) {
        passwordStatus.textContent = '❌ Error verifying password';
        passwordStatus.className = 'text-danger';
        passwordInput.value = '';
        passwordInput.focus();
      } finally {
        unlockBtn.disabled = false;
        unlockBtn.innerHTML = '<i class="bi bi-key"></i> Unlock';
      }
    });

    passwordInput.addEventListener('keypress', e => { if (e.key === 'Enter') unlockBtn.click(); });

    function tryAutoUnlock() {
      const authStatus = getAuthStatus();
      if (authStatus && authStatus.unlocked) { unlockApp(); return; }
      const saved = localStorage.getItem(REMEMBER_PASSWORD_KEY);
      if (saved) { 
        passwordInput.value = saved; 
        rememberCheckbox.checked = true;
        currentPassword = saved;
        setTimeout(() => { unlockBtn.click(); }, 300); 
      }
    }

    // ---------- RENDER TABLE ----------
    function renderTable() {
      const entries = getEntries();
      if (entries.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-secondary py-3 small">No pending entries. Sync or add new.</td></tr>`;
        return;
      }
      let html = '';
      entries.forEach((entry, index) => {
        html += `
          <tr>
            <td class="small">${index + 1}</td>
            <td class="small">${entry.grYear || ''}</td>
            <td class="small">${entry.grNo || ''}</td>
            <td class="small">${entry.psName || ''}</td>
            <td class="small">${entry.firNo || ''}</td>
            <td class="small">${entry.firRgDate || ''}</td>
            <td class="small">${entry.type || ''}</td>
            <td class="text-end text-nowrap">
              <button class="table-action-btn edit" onclick="editEntry(${index})"><i class="bi bi-pencil"></i></button>
              <button class="table-action-btn delete" onclick="deleteEntry(${index})"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
        `;
      });
      tableBody.innerHTML = html;
    }

    // ---------- ACTIONS ----------
    window.editEntry = function(index) {
      localStorage.setItem(EDIT_INDEX_KEY, String(index));
      window.location.href = 'index.html';
    };

    window.deleteEntry = function(index) {
      if (!confirm('Delete this entry?')) return;
      const entries = getEntries();
      entries.splice(index, 1);
      setEntries(entries);
      renderTable();
      updateStats();
    };

    window.clearAll = function() {
      if (!confirm('Delete all pending entries?')) return;
      setEntries([]);
      renderTable();
      updateStats();
    };

    // ---------- ARCHIVE (move from pending to archive) ----------
    function archiveEntry(entry) {
      const archive = getArchive();
      archive.push(entry);
      setArchive(archive);
    }

    // ---------- SYNC FUNCTIONS ----------
    function showProgressModal(title, desc, showProgress = true) {
      modalIcon.textContent = '⏳';
      modalTitle.textContent = title;
      modalDesc.textContent = desc;
      if (showProgress) {
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';
        progressText.textContent = '0%';
      } else {
        progressContainer.style.display = 'none';
      }
      modalBtn.disabled = true;
      modalBtn.textContent = 'Processing...';
      if (!modalInstance) modalInstance = new bootstrap.Modal(modalEl);
      modalInstance.show();
    }

    function updateProgress(percent, text) {
      progressFill.style.width = `${percent}%`;
      progressText.textContent = `${Math.round(percent)}% - ${text || ''}`;
    }

    function completeProgressModal(icon, title, desc, isSuccess) {
      modalIcon.textContent = icon;
      modalTitle.textContent = title;
      modalDesc.textContent = desc;
      progressContainer.style.display = 'none';
      modalBtn.disabled = false;
      modalBtn.textContent = 'OK';
      modalBtn.className = `btn ${isSuccess ? 'btn-success' : 'btn-primary'} px-5`;
    }

    // OPTIMIZED: Sync All using BATCH request with password
    window.syncAllToSheet = async function() {
      if (isSyncing) return;
      let entries = getEntries();
      if (entries.length === 0) {
        showModal('⚠️', 'No Data', 'No entries to sync.', false);
        return;
      }
      
      const password = getCurrentPassword();
      if (!password) {
        showModal('⚠️', 'Password Required', 'Please unlock the app first.', false);
        return;
      }
      
      isSyncing = true;
      syncAllBtn.disabled = true;
      showProgressModal('Syncing All (Batch)', `Sending ${entries.length} entries in one request...`, true);
      updateProgress(0, 'Preparing batch...');
      
      const total = entries.length;
      
      try {
        // Send ALL entries in a SINGLE request with password
        const formData = new FormData();
        formData.append('action', 'addMultipleRecords');
        formData.append('entries', JSON.stringify(entries));
        formData.append('password', password);
        
        updateProgress(30, 'Sending batch request...');
        
        const response = await fetch(SCRIPT_URL, { 
          method: 'POST', 
          body: formData
        });
        
        const data = await response.json();
        
        updateProgress(80, 'Processing response...');
        
        if (!data.success) {
          throw new Error(data.message || 'Sync failed');
        }
        
        // Archive all entries (FIFO order)
        for (let i = 0; i < entries.length; i++) {
          archiveEntry(entries[i]);
        }
        
        // Clear pending entries
        setEntries([]);
        renderTable();
        updateStats();
        
        updateProgress(100, 'Complete!');
        setTimeout(() => {
          completeProgressModal('✅', 'Batch Sync Complete', 
            `All ${total} entries synced and archived!`, true);
          syncAllBtn.disabled = false;
          isSyncing = false;
        }, 300);
        
      } catch (error) {
        updateProgress(100, 'Failed!');
        setTimeout(() => {
          completeProgressModal('❌', 'Sync Failed', 
            'Batch sync failed: ' + error.message, false);
          syncAllBtn.disabled = false;
          isSyncing = false;
        }, 300);
      }
    };

    // ---------- EXCEL DOWNLOAD (pending entries) ----------
    window.downloadExcel = function() {
      const entries = getEntries();
      if (entries.length === 0) {
        showModal('⚠️', 'No Data', 'No pending entries to export.', false);
        return;
      }
      // Build CSV
      const headers = ['GR Year', 'GR No', 'PS Name', 'FIR No', 'FIR Date', 'Type', 'Details', 'Remarks'];
      const rows = entries.map(e => [
        e.grYear || '', e.grNo || '', e.psName || '', e.firNo || '', e.firRgDate || '', e.type || '', e.details || '', e.remarks || ''
      ]);
      let csv = headers.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'gr_entries_pending.csv';
      link.click();
      URL.revokeObjectURL(link.href);
      showModal('📥', 'Excel Download', 'Pending entries exported as CSV.', true);
    };

    function showModal(icon, title, desc, isSuccess) {
      modalIcon.textContent = icon;
      modalTitle.textContent = title;
      modalDesc.textContent = desc;
      progressContainer.style.display = 'none';
      modalBtn.disabled = false;
      modalBtn.textContent = 'OK';
      modalBtn.className = `btn ${isSuccess ? 'btn-success' : 'btn-primary'} px-5`;
      if (!modalInstance) modalInstance = new bootstrap.Modal(modalEl);
      modalInstance.show();
    }

    modalBtn.addEventListener('click', function() {
      if (modalBtn.disabled) return;
      if (modalInstance) modalInstance.hide();
      isSyncing = false;
      syncAllBtn.disabled = false;
    });

    // ---------- INIT ----------
    loadRememberedPassword();
    tryAutoUnlock();
  })();
</script>
</body>
</html>
